<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - DEBUG版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { background: #050508; color: white; font-family: 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; }
        .loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #050508; z-index: 100; }
        /* 基礎樣式確保即便沒資料也有框架 */
        .question-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; min-height: 20vh; display: flex; items-center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">系統連線中...</div>
    <div id="root" class="h-full flex flex-col gap-4 p-8" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 【修正】確保 databaseURL 沒有結尾斜線
        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            console.log("Firebase 連結成功");

            window.ui = { showAnswer: false, chart: 'bar', currentPollId: null };
            let rawData = null;

            // 監聽根目錄，並增加 Error 處理
            onValue(ref(db, '/'), (snap) => {
                const data = snap.val();
                console.log("收到資料庫更新:", data);
                
                if (!data) {
                    document.getElementById('loading').innerText = "資料庫目前為空 (null)";
                    return;
                }

                rawData = data;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('root').style.display = 'flex';
                render();
            }, (error) => {
                console.error("Firebase 讀取失敗:", error);
                document.getElementById('loading').innerText = "連線失敗: " + error.message;
            });

            const render = () => {
                const root = document.getElementById('root');
                const polls = rawData.polls || rawData;
                const activeEntry = Object.entries(polls).find(([id, p]) => p.isActive === true);

                if (!activeEntry) {
                    root.innerHTML = `<div class="h-full flex items-center justify-center opacity-40">目前沒有啟動中的題目 (isActive: true)</div>`;
                    return;
                }

                const [id, poll] = activeEntry;
                const options = Object.values(poll.options || {});
                
                root.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="px-4 py-1 bg-red-600 rounded-full text-xs font-bold">LIVE</div>
                        <div class="flex gap-2 bg-white/10 p-1 rounded-lg">
                            <button onclick="window.setUI('bar')" class="px-4 py-1 rounded ${window.ui.chart==='bar'?'bg-white text-black':''}">BAR</button>
                            <button onclick="window.setUI('pie')" class="px-4 py-1 rounded ${window.ui.chart==='pie'?'bg-white text-black':''}">PIE</button>
                        </div>
                    </div>
                    <div class="question-box p-6">
                        <h1 class="text-3xl font-bold">${poll.question || "未設定題目"}</h1>
                    </div>
                    <div class="flex-1 flex gap-4">
                        <div class="flex-1 bg-white/5 rounded-3xl p-8">
                             ${window.ui.chart === 'bar' ? '柱狀圖模式' : '圓餅圖模式'}
                        </div>
                        <div class="w-1/3 flex flex-col gap-2">
                            ${options.map(o => `<div class="p-4 bg-white/10 rounded-xl">${o.text || o.label}</div>`).join('')}
                        </div>
                    </div>
                `;
            };

            window.setUI = (c) => { window.ui.chart = c; render(); };

        } catch (e) {
            console.error("程式碼執行錯誤:", e);
            document.getElementById('loading').innerText = "程式執行錯誤: " + e.message;
        }
    </script>
</body>
</html>
