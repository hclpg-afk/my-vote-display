<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const { useState, useEffect } = React;

        function App() {
            const [displayData, setDisplayData] = useState(null);
            const [loadingMsg, setLoadingMsg] = useState("📡 正在讀取投票資料...");

            useEffect(() => {
                const app = initializeApp(firebaseConfig);
                const db = getDatabase(app);
                // 根據你的 Rules，我們只抓 polls 這個路徑
                const pollsRef = ref(db, 'polls');

                onValue(pollsRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // 1. 嘗試尋找正在啟動的題目 (isActive)
                        let target = Object.values(data).find(p => p.isActive === true);
                        
                        // 2. 如果沒人啟動，就抓清單中的最後一個 (最新的題目)
                        if (!target) {
                            const keys = Object.keys(data);
                            target = data[keys[keys.length - 1]];
                        }

                        if (target) {
                            // 3. 處理選項：相容你的資料結構
                            const options = target.options ? Object.values(target.options).map(opt => ({
                                text: opt.text || opt.label || "選項",
                                count: opt.voteCount || 0
                            })) : [];

                            setDisplayData({
                                question: target.question || "未命名題目",
                                options: options
                            });
                        } else {
                            setLoadingMsg("❌ 資料庫內找不到有效題目");
                        }
                    } else {
                        setLoadingMsg("❌ 無法取得 polls 資料，請確認後台是否有題目");
                    }
                }, (err) => {
                    setLoadingMsg("❌ Firebase 連線失敗: " + err.message);
                });
            }, []);

            if (!displayData) {
                return (
                    <div className="flex h-screen items-center justify-center text-center p-10">
                        <div>
                            <div className="text-6xl mb-6">⏳</div>
                            <h1 className="text-2xl font-bold opacity-80">{loadingMsg}</h1>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 md:p-12 max-w-5xl mx-auto">
                    <div className="mb-12 text-center md:text-left">
                        <p className="text-blue-500 font-black tracking-tighter mb-2">LIVE VOTING</p>
                        <h1 className="text-4xl md:text-6xl font-black">{displayData.question}</h1>
                    </div>

                    <div className="grid gap-6">
                        {displayData.options.map((opt, i) => (
                            <div key={i} className="bg-slate-900 border border-white/10 p-6 rounded-3xl flex justify-between items-center shadow-2xl">
                                <span className="text-xl md:text-3xl font-bold">{opt.text}</span>
                                <span className="text-3xl md:text-5xl font-black text-blue-400 tabular-nums">
                                    {opt.count} <span className="text-sm font-normal opacity-40">票</span>
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
