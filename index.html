<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 綜藝視覺重構版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Inter:wght@200;300;400&display=swap');
        
        body { 
            background: #020205; 
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; overflow: hidden; margin: 0;
            display: flex; flex-direction: column;
        }

        /* 1. 極細冷色流光 Header */
        .header-box {
            position: relative; padding: 1px; border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05); overflow: hidden;
        }
        .header-box::before {
            content: ''; position: absolute; width: 180%; height: 180%;
            background: conic-gradient(from 0deg, transparent, #3b82f6, #818cf8, transparent);
            animation: rotate-fine 12s linear infinite; top: -40%; left: -40%; z-index: 0;
        }
        @keyframes rotate-fine { 100% { transform: rotate(360deg); } }

        .header-content {
            position: relative; z-index: 1;
            background: #080810; padding: 1.5rem 3rem; border-radius: 1.4rem;
        }

        /* 2. 綜藝文字規格：放大、不粗、有層次 */
        .poll-question { font-weight: 400; font-size: 2.5rem; letter-spacing: 0.05em; color: #f8fafc; }
        .option-text { font-weight: 300; font-size: 2.2rem; color: #e2e8f0; } /* 顯著放大 */
        
        .vote-number {
            font-family: 'Inter', sans-serif;
            font-weight: 200; font-size: 5.5rem; /* 極大化數字效果 */
            line-height: 1; letter-spacing: -0.05em;
        }

        /* 3. 皇冠與勳章效果 */
        .crown-svg {
            width: 50px; height: 50px; fill: #fbbf24;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.5));
            animation: crown-float 2s ease-in-out infinite;
        }
        @keyframes crown-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.1); }
        }

        /* 4. 選項卡片：解決擠壓問題 */
        .variety-card {
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem 2.5rem; border-radius: 1.5rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: space-between;
            min-height: 120px; /* 確保選項有足夠高度 */
        }
        .variety-card.leading {
            background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, rgba(99,102,241,0.1) 100%);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(15px); /* 領先者稍微突出 */
        }

        .index-badge {
            width: 4rem; height: 4rem; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 300; border: 1px solid rgba(255,255,255,0.1);
        }

        /* 5. 全螢幕解答層 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.7s ease;
        }
        .reveal-overlay.active { opacity: 1; pointer-events: auto; }
        .reveal-content { transform: scale(0.95); opacity: 0; transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .reveal-overlay.active .reveal-content { transform: scale(1); opacity: 1; }

    </style>
</head>
<body class="p-8">

    <div id="root" class="h-full flex flex-col max-w-[1600px] mx-auto w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'pie', currentPollId: null };
        const syncColors = ['#60a5fa', '#34d399', '#fbbf24', '#f472b6'];
        let rawData = null;
        let animatedVotes = {};

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex items-center justify-center opacity-10 text-4xl font-extralight tracking-[0.5em]">SYSTEM STANDBY</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const isHidden = window.ui.chart === 'none';
            const expertMsg = poll.expertAnalysis || poll.analysis || "解析中...";

            root.innerHTML = `
                <div class="w-full flex justify-between items-end mb-10">
                    <div class="flex items-center gap-5">
                        <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.5)]"></div>
                        <span class="text-sm font-light tracking-[0.4em] opacity-40 uppercase">Broadcast Channel 01</span>
                    </div>
                    <div class="flex gap-12 items-end">
                        <div class="flex bg-white/5 p-1 rounded-xl border border-white/5">
                            <button onclick="window.setUI('bar')" class="px-5 py-2 rounded-lg text-xs tracking-widest ${window.ui.chart==='bar'?'bg-white/10 opacity-100':'opacity-20'} transition">BAR</button>
                            <button onclick="window.setUI('pie')" class="px-5 py-2 rounded-lg text-xs tracking-widest ${window.ui.chart==='pie'?'bg-white/10 opacity-100':'opacity-20'} transition">PIE</button>
                            <button onclick="window.setUI('none')" class="px-5 py-2 rounded-lg text-xs tracking-widest ${window.ui.chart==='none'?'bg-red-900/40 opacity-100':'opacity-20'} transition">HIDE</button>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] opacity-30 uppercase tracking-[0.3em] mb-1">Live Votes</div>
                            <div class="text-5xl font-extralight tabular-nums">${total}</div>
                        </div>
                    </div>
                </div>

                <div class="header-box mb-12">
                    <div class="header-content">
                        <h1 class="poll-question text-center">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-10 items-center mb-10 min-h-0">
                    ${!isHidden ? `
                    <div class="col-span-4 h-full flex items-center justify-center bg-white/[0.01] rounded-[3rem] border border-white/5 shadow-inner">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${isHidden ? 'col-span-10 col-start-2' : 'col-span-8'} flex flex-col justify-center gap-6">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="variety-card ${isLeader ? 'leading' : ''}">
                                <div class="flex items-center gap-10">
                                    <div class="index-badge" style="background: ${syncColors[i%4]}11; color: ${syncColors[i%4]}; border-color: ${syncColors[i%4]}33;">${String.fromCharCode(65+i)}</div>
                                    <div class="option-text">${o.text || o.label}</div>
                                </div>
                                <div class="flex items-center gap-12">
                                    <div class="vote-number" style="color: ${isLeader ? '#fff' : 'rgba(255,255,255,0.6)'}">${animatedVotes[pollId + i] || o.voteCount}</div>
                                    <div class="w-16 flex justify-center">
                                        ${isLeader ? `
                                            <svg class="crown-svg" viewBox="0 0 24 24"><path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.6 18.6 20 18 20H6C5.4 20 5 19.6 5 19V18H19V19Z" /></svg>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>

                <button onclick="window.triggerReveal()" class="w-full py-6 rounded-3xl border border-white/5 bg-white/[0.03] hover:bg-white/[0.08] text-white/40 text-sm font-light tracking-[0.8em] transition-all hover:tracking-[1em] active:scale-[0.99]">
                    REVEAL ANALYSIS
                </button>

                <div id="reveal-layer" class="reveal-overlay">
                    <div class="max-w-6xl w-full text-center reveal-content p-20">
                        <div class="text-xs tracking-[1em] opacity-30 mb-16 uppercase">Expert Panel Insight</div>
                        <h2 class="text-5xl font-light leading-relaxed text-white/95 italic">「 ${expertMsg} 」</h2>
                        <div class="mt-24 flex justify-center gap-10">
                            <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="px-16 py-5 rounded-full border border-white/10 hover:bg-white/5 transition text-xs tracking-widest font-light">AUDIO SYSTEM</button>
                            <button onclick="window.toggleAnswer(false)" class="px-16 py-5 rounded-full bg-white text-black text-xs tracking-widest font-bold shadow-2xl">RETURN TO SHOW</button>
                        </div>
                    </div>
                </div>
            `;
            if (window.ui.showAnswer) document.getElementById('reveal-layer').classList.add('active');
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-[350px] gap-8 px-16">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 2;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="w-full rounded-t-lg transition-all duration-1000 shadow-[0_0_30px_rgba(0,0,0,0.5)]" style="height: ${h}%; background: linear-gradient(180deg, ${syncColors[i%4]}cc, ${syncColors[i%4]}22);"></div>
                            <div class="mt-6 text-[10px] opacity-20 font-bold tracking-widest uppercase">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                const x1 = Math.cos(2 * Math.PI * curr), y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr), y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}" opacity="0.8"></path>`;
            }).join('');
            return `<div class="relative w-[350px] h-[350px] drop-shadow-[0_0_40px_rgba(0,0,0,0.4)]"><svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-full h-full">${paths}</svg></div>`;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.triggerReveal = () => { window.toggleAnswer(true); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 1;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            if (!data) return;
            const activeEntry = Object.entries(data).find(([id, p]) => p.isActive);
            if (activeEntry && activeEntry[0] !== window.ui.currentPollId) {
                window.ui.showAnswer = false; window.ui.currentPollId = activeEntry[0];
                animatedVotes = {};
            }
            if (activeEntry) {
                Object.values(activeEntry[1].options || {}).forEach((o, i) => {
                    animatedVotes[activeEntry[0] + i] = Number(o.voteCount);
                });
            }
            rawData = data; render();
        });
    </script>
</body>
</html>
