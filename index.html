<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const { useState, useEffect } = React;
        function App() {
            const [poll, setPoll] = useState(null);
            const [msg, setMsg] = useState("📡 正在嘗試連線 Firebase...");

            useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const db = getDatabase(app);
                    const pollsRef = ref(db, 'polls');
                    
                    onValue(pollsRef, (snap) => {
                        const data = snap.val();
                        if (data) {
                            // 抓取第一個題目測試
                            const firstPoll = Object.values(data)[0];
                            const options = firstPoll.options ? Object.values(firstPoll.options) : [];
                            setPoll({ question: firstPoll.question, options });
                        } else {
                            setMsg("❌ 資料庫裡沒有題目 (polls 分支是空的)");
                        }
                    }, (err) => {
                        setMsg("❌ Firebase 拒絕連線: " + err.message);
                    });
                } catch (e) {
                    setMsg("❌ 程式執行出錯: " + e.message);
                }
            }, []);

            if (!poll) return <div class="h-screen flex items-center justify-center text-xl font-bold p-10 text-center">{msg}</div>;

            return (
                <div class="p-10 max-w-4xl mx-auto">
                    <h1 class="text-4xl font-black mb-10 text-blue-400">{poll.question}</h1>
                    <div class="space-y-4">
                        {poll.options.map((opt, i) => (
                            <div key={i} class="p-6 bg-white/10 rounded-2xl flex justify-between border border-white/10">
                                <span class="text-2xl font-bold">{opt.text || opt.label}</span>
                                <span class="text-3xl font-black text-green-400">{opt.voteCount || 0} 票</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
