<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-10 font-sans">
    <div id="main-display">
        <h1 class="text-2xl animate-pulse text-blue-400">📡 正在從 polls 資料夾讀取題目...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const display = document.getElementById('main-display');

        // 精準監聽 polls 路徑，避開根目錄權限限制
        const pollsRef = ref(db, 'polls');

        onValue(pollsRef, (snapshot) => {
            const polls = snapshot.val();
            if (!polls) {
                display.innerHTML = "<h1>❌ 讀取成功，但 polls 資料夾裡沒有任何題目</h1>";
                return;
            }

            // 找出 isActive 為 true 的題目，或最後一個題目
            const entries = Object.entries(polls);
            let target = entries.find(([id, val]) => val.isActive === true);
            if (!target) target = entries[entries.length - 1];

            const [id, pollData] = target;
            
            let optionsHtml = "";
            if (pollData.options) {
                Object.values(pollData.options).forEach(o => {
                    optionsHtml += `
                        <div class="p-8 bg-white/5 rounded-[2rem] mb-4 border border-white/10 flex justify-between items-center">
                            <span class="text-3xl font-bold">${o.text || o.label || "選項"}</span>
                            <span class="text-4xl font-black text-blue-400">${o.voteCount || 0} <span class="text-xl font-normal opacity-40">票</span></span>
                        </div>
                    `;
                });
            }

            display.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <p class="text-blue-500 font-black mb-2">LIVE VOTING</p>
                    <h1 class="text-5xl md:text-7xl font-black mb-12 tracking-tight">${pollData.question || "未命名題目"}</h1>
                    <div class="grid gap-4">${optionsHtml}</div>
                </div>
            `;
        }, (err) => {
            display.innerHTML = `<div class="p-10 bg-red-500/10 border border-red-500/50 rounded-2xl">
                <h1 class="text-red-500 text-2xl font-bold mb-2">❌ 存取失敗</h1>
                <p class="opacity-70">Firebase 訊息: ${err.message}</p>
                <p class="mt-4 text-sm">請確認資料庫 Rules 是否包含 "polls": { ".read": true }</p>
            </div>`;
        });
    </script>
</body>
</html>
