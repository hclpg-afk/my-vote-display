<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>現場投票系統 - 舞台版</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

body {
    background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%), #020617;
    font-family: 'Noto Sans TC', sans-serif;
    color: #fff;
    height: 100vh;
    margin: 0;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== Freeze ===== */
body.freeze {
    filter: brightness(0.7) saturate(0.8);
}

/* ===== 問題區 ===== */
.question-box {
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(20px);
    border-radius: 2rem;
    min-height: 18vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== 選項 ===== */
.option-card {
    background: rgba(255,255,255,0.05);
    border-radius: 1.2rem;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    height: 100%;
    width: 100%;
    transition: all .6s ease;
}

/* 勝者 */
.option-card.winner {
    transform: scale(1.15);
    background: linear-gradient(135deg, rgba(251,191,36,0.35), rgba(251,191,36,0.1));
    box-shadow: 0 0 120px rgba(251,191,36,0.6);
    z-index: 10;
}

/* 敗者 */
.option-card.loser {
    opacity: .25;
    transform: scale(.9);
    filter: blur(1px);
}

/* Reveal */
.reveal-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(2,6,23,.98);
}

.reveal-overlay.active {
    display: flex;
}

/* 閃光 */
.reveal-overlay.active::after {
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle, rgba(255,255,255,.15), transparent 70%);
    animation: flash .6s ease;
}

@keyframes flash {
    0%{opacity:0}
    30%{opacity:1}
    100%{opacity:0}
}

.voice-btn.speaking {
    background: rgba(239,68,68,0.3);
    color: #fca5a5;
}
</style>
</head>

<body>
<div id="root" class="h-full flex flex-col gap-6"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
    databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "voting-event"
});
const db = getDatabase(app);

/* 音效 */
const sounds = {
    tick: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.mp3"),
    boom: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-deep-impact-echo-hit-321.mp3"),
    win: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3")
};
Object.values(sounds).forEach(s=>s.volume=.6);

/* UI state */
window.ui = { showAnswer:false, isSpeaking:false };

/* render */
const render = () => {
    if(!window.rawData) return;

    const active = Object.values(window.rawData).find(p=>p.isActive);
    if(!active) return;

    const options = Object.values(active.options || {});

    document.getElementById('root').innerHTML = `
        <div class="question-box px-10 py-6">
            <h1 class="text-5xl font-black text-center">Q: ${active.question}</h1>
        </div>

        <div class="flex-1 flex flex-col gap-6 h-full">
            ${options.map((o,i)=>`
                <div class="flex-1 flex">
                    <div class="option-card">
                        <div class="text-6xl font-black mr-6">${String.fromCharCode(65+i)}</div>
                        <div class="text-4xl font-bold">${o.text}</div>
                    </div>
                </div>
            `).join('')}
        </div>

        <button onclick="toggleReveal(true)" class="h-20 bg-indigo-600 rounded-xl text-2xl font-bold">
            揭曉
        </button>

        <div id="reveal" class="reveal-overlay">
            <div class="text-center">
                <h2 class="text-5xl mb-10">${active.analysis || ''}</h2>

                <button id="voiceBtn" onclick="toggleSpeech()" class="voice-btn px-10 py-4 rounded-full">
                    🔊 朗讀解析
                </button>
            </div>
        </div>
    `;
};

/* 勝負判斷 */
function highlightWinner(){
    const cards = document.querySelectorAll('.option-card');
    let max = 0;

    cards.forEach((c,i)=>{
        const vote = Object.values(window.rawData)[0].options[i].voteCount;
        if(vote>max) max=vote;
    });

    cards.forEach((c,i)=>{
        const vote = Object.values(window.rawData)[0].options[i].voteCount;
        if(vote===max) c.classList.add('winner');
        else c.classList.add('loser');
    });
}

/* reset */
function resetOptions(){
    document.querySelectorAll('.option-card').forEach(c=>{
        c.classList.remove('winner','loser');
    });
}

/* Reveal 節奏 */
window.toggleReveal = (s)=>{
    const el = document.getElementById('reveal');

    if(s){
        el.style.display='flex';

        sounds.tick.play();
        document.body.classList.add("freeze");

        setTimeout(()=>sounds.tick.play(),800);

        setTimeout(()=>{
            sounds.boom.play();
            highlightWinner();
            el.classList.add('active');
        },1200);

        setTimeout(()=>{
            sounds.win.play();
        },2000);

    }else{
        el.classList.remove('active');
        resetOptions();
        document.body.classList.remove("freeze");
        el.style.display='none';
    }
};

/* 語音 */
window.toggleSpeech = ()=>{
    const btn=document.getElementById('voiceBtn');

    if(window.ui.isSpeaking){
        speechSynthesis.cancel();
        window.ui.isSpeaking=false;
        btn.innerHTML="🔊 朗讀解析";
    }else{
        const text = Object.values(window.rawData)[0].analysis || "";
        const u = new SpeechSynthesisUtterance(text);
        u.lang="zh-TW";

        u.onend=()=>{
            window.ui.isSpeaking=false;
            btn.innerHTML="🔊 朗讀解析";
        };

        speechSynthesis.speak(u);
        window.ui.isSpeaking=true;
        btn.innerHTML="⏹ 停止";
    }
};

/* Firebase */
onValue(ref(db,'polls'),snap=>{
    window.rawData = snap.val();
    render();
});
</script>
</body>
</html>
