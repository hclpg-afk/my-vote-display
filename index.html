<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 綜藝大秀版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff; height: 100vh; overflow: hidden; margin: 0;
            display: flex; flex-direction: column;
        }

        /* 1. 題目流光邊框特效 */
        .header-box {
            position: relative;
            padding: 4px; border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }
        .header-box::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: conic-gradient(#4facfe, #00f2fe, #7000ff, #ff00c8, #4facfe);
            animation: rotate 4s linear infinite;
            top: -50%; left: -50%; z-index: 0;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .header-content {
            position: relative; z-index: 1;
            background: #0a0a20; padding: 1.5rem 2.5rem; border-radius: 1.3rem;
        }

        /* 2. 領先者閃爍效果 */
        @keyframes pulse-gold {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .leader-badge {
            background: linear-gradient(90deg, #ffd700, #ffa500);
            color: #000; padding: 2px 12px; border-radius: 99px;
            font-size: 0.75rem; font-weight: 900;
            animation: pulse-gold 1s infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        /* 3. 揭曉閃光衝擊 */
        .reveal-flash {
            position: fixed; inset: 0; background: white; z-index: 10000;
            animation: flashOut 0.8s forwards; pointer-events: none;
        }
        @keyframes flashOut { 0% { opacity: 1; } 100% { opacity: 0; } }

        .vote-display {
            font-size: 4rem; font-weight: 700;
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px #442200);
            line-height: 1; font-variant-numeric: tabular-nums;
        }

        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            min-height: 125px; border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .variety-card.leading {
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.05);
            transform: scale(1.02) translateX(10px);
        }

        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle, #2d1b69 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="p-8">

    <div id="root" class="h-full flex flex-col max-w-[1600px] mx-auto w-full"></div>
    <div id="flash-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'pie', currentPollId: null };
        const syncColors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];
        const syncLightColors = ['#60a5fa', '#67e8f9', '#c084fc', '#f472b6'];
        
        let rawData = null;
        let animatedVotes = {}; // 儲存滾動中的數字

        // 數字滾動動畫函數
        const animateValue = (id, start, end, duration) => {
            if (start === end) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                animatedVotes[id] = Math.floor(progress * (end - start) + start);
                render();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        };

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            
            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center">...等待開題...</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            
            // 找出最高票數 (領先者)
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const isHidden = window.ui.chart === 'none';
            const expertMsg = poll.expertAnalysis || poll.analysis || poll.expertAnswer || poll.answer || "主持人正在整理分析中...";

            root.innerHTML = `
                <div class="w-full flex justify-between items-end mb-6">
                    <div class="bg-red-600 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-3 shadow-lg shadow-red-900/40">
                        <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> LIVE 連線中
                    </div>
                    
                    <div class="flex gap-4 items-center">
                        <div class="flex bg-white/10 p-1 rounded-xl">
                            <button onclick="window.setUI('bar')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='bar'?'bg-cyan-500 shadow-lg':'hover:bg-white/5'} transition">長條圖</button>
                            <button onclick="window.setUI('pie')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='pie'?'bg-cyan-500 shadow-lg':'hover:bg-white/5'} transition">圓餅圖</button>
                            <button onclick="window.setUI('none')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='none'?'bg-red-500 shadow-lg':'hover:bg-white/5'} transition">隱藏圖表</button>
                        </div>
                        <div class="h-10 w-[2px] bg-white/10 mx-2"></div>
                        <div class="text-right">
                            <div class="text-xs font-bold opacity-50 uppercase tracking-tighter">Total Votes</div>
                            <div class="vote-display text-5xl">${total}</div>
                        </div>
                    </div>
                </div>

                <div class="header-box mb-8">
                    <div class="header-content text-center">
                        <h1 class="text-4xl font-black tracking-tight leading-snug">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-10 items-stretch mb-8 overflow-hidden min-h-0">
                    ${!isHidden ? `
                    <div class="col-span-6 bg-white/5 rounded-[3rem] flex items-center justify-center border border-white/10 p-10 overflow-hidden">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${isHidden ? 'col-span-12 px-20' : 'col-span-6'} flex flex-col justify-around gap-4 min-h-0">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="variety-card w-full flex items-center justify-between px-10 ${isLeader ? 'leading' : ''}">
                                <div class="flex items-center gap-8">
                                    <div class="w-16 h-16 rounded-full flex items-center justify-center text-4xl font-black shadow-2xl" style="background-color: ${syncColors[i % 4]};">${String.fromCharCode(65+i)}</div>
                                    <div class="flex flex-col">
                                        ${isLeader ? `<div class="leader-badge mb-1 w-fit">LEADING 領先</div>` : ''}
                                        <div class="text-3xl font-black">${o.text || o.label}</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="vote-display text-6xl">${animatedVotes[pollId + i] || o.voteCount}</div>
                                    <div class="text-xs font-bold opacity-30 uppercase tracking-widest mt-1">Votes</div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>

                <button onclick="window.triggerReveal()" class="w-full bg-gradient-to-r from-red-600 via-pink-600 to-purple-600 py-8 rounded-[2.5rem] text-4xl font-black tracking-widest active:scale-[0.98] transition-all animate-pulse shadow-[0_20px_60px_rgba(225,29,72,0.4)] border-t border-white/20">
                    🔥 揭 曉 專 家 分 析
                </button>

                ${window.ui.showAnswer ? `
                    <div class="reveal-overlay p-12 animate-[flashIn_0.5s_ease-out]">
                        <div class="max-w-6xl w-full text-center">
                            <div class="inline-block bg-amber-400 text-black px-12 py-3 rounded-full text-lg font-black mb-12 shadow-2xl">EXPERT ANALYSIS</div>
                            <h2 class="text-6xl font-black leading-[1.6] mb-24 italic text-white drop-shadow-[0_10px_30px_rgba(0,0,0,1)]">「 ${expertMsg} 」</h2>
                            <div class="flex justify-center gap-12">
                                <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="bg-cyan-500 hover:bg-cyan-400 text-white px-28 py-8 rounded-full text-3xl font-black shadow-[0_15px_50px_rgba(6,182,212,0.5)] transition active:scale-95">🔊 播放分析</button>
                                <button onclick="window.toggleAnswer(false)" class="bg-white/10 hover:bg-white/20 text-white px-28 py-8 rounded-full text-3xl font-black transition">返回現場</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-full max-h-[450px] gap-12 px-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="vote-display text-5xl mb-8">${o.voteCount}</div>
                            <div class="w-full rounded-t-[2.5rem] shadow-2xl transition-all duration-1000" style="height: ${h}%; background: linear-gradient(to top, ${syncColors[i % 4]}, ${syncLightColors[i % 4]}, white);"></div>
                            <div class="mt-8 font-black text-3xl opacity-20 uppercase">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                const x1 = Math.cos(2 * Math.PI * curr), y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr), y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}" stroke="#0a0a20" stroke-width="0.01"></path>`;
            }).join('');
            return `
                <div class="relative w-[450px] h-[450px] flex items-center justify-center">
                    <svg viewBox="-1.02 -1.02 2.04 2.04" class="transform -rotate-90 w-full h-full drop-shadow-[0_0_50px_rgba(0,0,0,0.8)]">${paths}</svg>
                    <div class="absolute flex flex-col items-center bg-[#0a0a20]/90 p-8 rounded-full border border-white/20 backdrop-blur-xl shadow-2xl">
                        <div class="text-xs font-black opacity-40 mb-1 tracking-[0.3em] uppercase">Total</div>
                        <div class="text-7xl font-black">${total}</div>
                    </div>
                </div>
            `;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        
        // 觸發視覺閃光並揭曉
        window.triggerReveal = () => {
            document.getElementById('flash-container').innerHTML = `<div class="reveal-flash"></div>`;
            setTimeout(() => { window.toggleAnswer(true); }, 100);
        };

        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            if (!data) return;
            const activeEntry = Object.entries(data).find(([id, p]) => p.isActive);
            const activeId = activeEntry ? activeEntry[0] : null;

            if (activeId !== window.ui.currentPollId) {
                window.ui.showAnswer = false; window.ui.currentPollId = activeId;
                animatedVotes = {}; // 切題重置動畫
            }

            // 處理數字滾動動畫邏輯
            if (activeEntry) {
                const options = Object.values(activeEntry[1].options || {});
                options.forEach((o, i) => {
                    const key = activeId + i;
                    const target = Number(o.voteCount);
                    if ((animatedVotes[key] || 0) < target) {
                        animateValue(key, animatedVotes[key] || 0, target, 800);
                    } else {
                        animatedVotes[key] = target;
                    }
                });
            }

            rawData = data;
            render();
        });
    </script>
</body>
</html>
