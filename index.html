<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>投票系統｜節目控制台版</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #020617;
    font-family: 'Noto Sans TC', sans-serif;
    color: white;
    height: 100vh;
    margin: 0;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* 動態字體 */
.fit-text {
    font-size: clamp(1rem, 2.2vw, 2rem);
}
.title-text {
    font-size: clamp(1.8rem, 3vw, 3rem);
}

/* 卡片 */
.option-card {
    background: rgba(255,255,255,0.05);
    border-radius: 1rem;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    height: 100%;
    overflow: hidden;
    transition: .3s;
}
.option-card.leading {
    border: 1px solid gold;
    transform: scale(1.02);
}

/* 限制文字 */
.auto-text {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* 圖表動畫 */
.bar {
    transition: height 1s ease;
}

/* overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
}
.overlay.active {
    display: flex;
}
</style>
</head>

<body>

<div id="root" class="flex-1 flex flex-col gap-4"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "voting-event"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 控制台狀態 */
window.ui = {
    showAnswer: false,
    showChart: true
};

/* 正確抓分析 */
const getAnalysis = (poll) => {
    return poll.expertAnalysis || "尚無專家分析";
};

/* 主渲染 */
const render = () => {
    if (!window.rawData) return;

    const active = Object.values(window.rawData).find(p => p.isActive);
    if (!active) {
        root.innerHTML = "等待題目...";
        return;
    }

    const options = Object.values(active.options || {});
    const total = options.reduce((s,o)=>s+(o.voteCount||0),0);
    const max = Math.max(...options.map(o=>o.voteCount||0));
    const analysis = getAnalysis(active);

    root.innerHTML = `
    
    <!-- 上方 -->
    <div class="flex justify-between items-center">
        <div>LIVE</div>
        <div>票數 ${total}</div>
    </div>

    <!-- 題目 -->
    <div class="text-center title-text">${active.question}</div>

    <!-- 主區 -->
    <div class="flex-1 flex gap-4 overflow-hidden">

        ${window.ui.showChart ? `
        <!-- 圖表 -->
        <div class="flex-[0.8] flex items-end gap-2">
            ${options.map(o=>{
                const h = total ? (o.voteCount/total*100) : 5;
                return `
                <div class="flex-1 bg-indigo-500 bar" style="height:${h}%"></div>
                `;
            }).join("")}
        </div>
        ` : ""}

        <!-- 選項 -->
        <div class="flex-1 flex flex-col gap-2 overflow-hidden">
            ${options.map((o,i)=>{
                const lead = o.voteCount===max && max>0;
                return `
                <div class="flex-1">
                    <div class="option-card ${lead?'leading':''}">
                        <div class="mr-4">${String.fromCharCode(65+i)}</div>
                        <div class="auto-text fit-text flex-1">${o.text}</div>
                    </div>
                </div>
                `;
            }).join("")}
        </div>

    </div>

    <!-- 控制按鈕 -->
    <div class="flex gap-2">
        <button onclick="toggleChart()">圖表開關</button>
        <button onclick="toggleAnswer()">揭曉答案</button>
    </div>

    <!-- overlay -->
    <div id="overlay" class="overlay ${window.ui.showAnswer?'active':''}">
        <div class="text-center max-w-xl">
            <h2 class="text-3xl mb-6">專家解析</h2>
            <p class="text-xl">${analysis}</p>
            <button onclick="toggleAnswer()">關閉</button>
        </div>
    </div>
    `;
};

/* 控制 */
window.toggleChart = () => {
    window.ui.showChart = !window.ui.showChart;
    render();
};

window.toggleAnswer = () => {
    window.ui.showAnswer = !window.ui.showAnswer;
    render();
};

/* Firebase */
onValue(ref(db,'polls'), snap=>{
    window.rawData = snap.val();
    render();
});
</script>

</body>
</html>
