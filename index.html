<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票系統 - 專業展示版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { 
            background: radial-gradient(circle at center, #3c2a7a 0%, #0c0a2a 100%);
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .answer-box { background: rgba(255, 255, 255, 0.03); border: 2px solid #fbbf24; border-radius: 2.5rem; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .btn-orange { background: linear-gradient(90deg, #f59e0b, #ea580c); box-shadow: 0 0 20px rgba(234, 88, 12, 0.4); }
        .bar-green { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="text-white min-h-screen p-10">
    <div id="root" class="max-w-[1500px] mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI 狀態
        let showChart = true;
        let showAnswer = false;
        let lastData = null;

        const render = () => {
            if (!lastData) return;
            const target = Object.values(lastData).find(p => p.isActive) || Object.values(lastData)[0];
            const options = Object.values(target.options || {});
            const totalVotes = options.reduce((s, o) => s + (o.voteCount || 0), 0);

            document.getElementById('root').innerHTML = `
                <div class="flex items-center gap-3 mb-8 opacity-60">
                    <span class="bg-red-500 px-3 py-1 rounded-full text-[10px] font-bold">● LIVE</span>
                    <span class="text-sm">已投 ${totalVotes} 票</span>
                    <button onclick="window.toggleChart()" class="ml-auto text-xs border border-white/20 px-3 py-1 rounded-lg hover:bg-white/10">
                        ${showChart ? '隱藏圖表' : '顯示圖表'}
                    </button>
                </div>

                <h1 class="text-5xl font-bold mb-14 leading-tight tracking-wide flex items-start gap-4">
                    <span>🧠</span>
                    <span>${target.question}</span>
                </h1>

                <div class="grid grid-cols-12 gap-10">
                    <div class="col-span-12 lg:col-span-5 transition-all duration-500 ${showChart ? '' : 'hidden opacity-0 scale-95'}">
                        <div class="glass-card h-[500px] flex items-end justify-around p-10 pt-20">
                            ${options.map((opt, i) => {
                                const h = totalVotes > 0 ? (opt.voteCount / totalVotes * 90) : 5;
                                return `
                                    <div class="flex flex-col items-center gap-4 w-full">
                                        <span class="text-xl font-bold">${opt.voteCount}</span>
                                        <div class="bar-green w-16 rounded-t-2xl transition-all duration-700" style="height: ${h}%"></div>
                                        <span class="opacity-30 text-sm font-bold">${String.fromCharCode(65+i)}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="${showChart ? 'lg:col-span-7' : 'lg:col-span-12'} col-span-12 space-y-6">
                        ${options.map((opt, i) => {
                            const per = totalVotes > 0 ? Math.round(opt.voteCount/totalVotes*100) : 0;
                            return `
                                <div class="glass-card p-6 flex justify-between items-center px-10 border-l-4 border-l-blue-500/50">
                                    <div class="flex items-center gap-6">
                                        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-300 font-bold">${String.fromCharCode(65+i)}</div>
                                        <span class="text-2xl font-medium">${opt.text || opt.label}</span>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-3xl font-bold">${opt.voteCount} <span class="text-base opacity-40 font-normal">票</span></div>
                                        <div class="text-xs opacity-30 font-mono">${per}%</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}

                        <div class="pt-6">
                            <button onclick="window.toggleAnswer()" class="w-full btn-orange py-5 rounded-[2rem] text-2xl font-bold flex items-center justify-center gap-3 transition-transform active:scale-95">
                                💡 公佈答案
                            </button>
                        </div>

                        <div class="transition-all duration-500 ${showAnswer ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none hidden'}">
                            <div class="answer-box p-10 relative">
                                <div class="flex items-center justify-between mb-8">
                                    <div class="flex items-center gap-4">
                                        <span class="text-3xl text-yellow-400">💡</span>
                                        <h2 class="text-3xl font-bold text-yellow-400">專家解答</h2>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <div class="bg-white/10 px-4 py-1 rounded-full text-xs opacity-60">慢  正常  快  很快</div>
                                        <button class="bg-yellow-400 text-black px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">🔊 朗讀</button>
                                    </div>
                                </div>
                                <p class="text-2xl leading-relaxed text-yellow-50/90">${target.expertAnalysis || "正在準備解析..."}</p>
                                <button onclick="window.toggleAnswer()" class="mt-8 opacity-30 text-sm underline">隱藏解答</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-12 glass-card py-4 px-10 w-fit mx-auto opacity-50 italic">
                    哇！超多人選這個 👀 真的嗎？
                </div>
            `;
        };

        window.toggleChart = () => { showChart = !showChart; render(); };
        window.toggleAnswer = () => { showAnswer = !showAnswer; render(); };

        onValue(ref(db, 'polls'), (snapshot) => {
            lastData = snapshot.val();
            render();
        });
    </script>
</body>
</html>
