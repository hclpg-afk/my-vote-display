<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 全功能修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 70%), #050508;
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; margin: 0; padding: 1rem 2rem;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 題目框細流光 */
        .question-box {
            position: relative; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem; min-height: 20vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .question-box::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 60%, transparent 100%);
            transform: skewX(-20deg); animation: fineScan 6s infinite ease-in-out;
        }
        @keyframes fineScan { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }

        /* 選項卡片 */
        .option-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2rem; padding: 0.8rem 2rem; height: 100%;
            display: flex; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .option-card.leading {
            background: rgba(255, 255, 255, 0.12); border-color: #fbbf24;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }

        /* 揭曉按鈕 */
        .shimmer-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777, #4f46e5);
            background-size: 200% auto; animation: shimmerMove 3s linear infinite;
        }
        @keyframes shimmerMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* 專家答案氣勢動畫 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999; background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(25px); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.6s ease;
        }
        .reveal-overlay.active { display: flex; opacity: 1; }
        
        .expert-text {
            font-style: italic; font-weight: 700;
            background: linear-gradient(to bottom, #fff 40%, #a5b4fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transform: scale(0.7) skewX(-10deg); letter-spacing: -0.05em;
            opacity: 0; transition: all 0.9s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .reveal-overlay.active .expert-text {
            transform: scale(1) skewX(-10deg); letter-spacing: 0.05em; opacity: 1;
        }

        /* 圖表與動畫 */
        .chart-container { transition: all 0.6s ease; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .bar-anim { transition: height 1s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        svg path { transition: d 0.8s ease, fill 0.5s ease; }
    </style>
</head>
<body>

    <div id="root" class="h-full flex flex-col gap-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 更新為你正確的資料庫網址
        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'bar', currentPollId: null };
        const syncColors = ['#818cf8', '#34d399', '#fbbf24', '#f472b6'];
        let rawData = null;

        // 【專家答案抓取邏輯優化】
        const findExpertAnalysis = (poll) => {
            if (!poll) return "...";
            // 優先尋找已知欄位
            const keys = ['expertAnalysis', 'analysis', 'expertMsg', 'description', 'expert', 'result_text'];
            for (let k of keys) {
                if (poll[k] && typeof poll[k] === 'string' && poll[k].length > 1) return poll[k];
            }
            // 備援：全物件掃描，抓取除了題目以外最長的一段文字
            let found = "";
            const deepScan = (obj) => {
                if (typeof obj === 'string' && obj !== poll.question && obj.length > found.length) found = obj;
                else if (obj && typeof obj === 'object') Object.values(obj).forEach(deepScan);
            };
            deepScan(poll);
            return found || "數據分析完成，請參考現場專家講解。";
        };

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            
            // 支援不同層級的資料結構尋找 isActive
            const pollsData = rawData.polls || rawData;
            const activeEntry = Object.entries(pollsData).find(([id, p]) => p.isActive === true);
            
            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex items-center justify-center opacity-20 text-xl font-black">WAITING FOR LIVE SESSION...</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const expertMsg = findExpertAnalysis(poll);
            const chartMode = window.ui.chart;

            root.innerHTML = `
                <div class="flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2 bg-red-600/20 px-4 py-1.5 rounded-full border border-red-600/30">
                        <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                        <span class="text-[10px] font-black tracking-widest uppercase text-red-500">Live Stage</span>
                    </div>
                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                        <button onclick="window.setUI('bar')" class="px-5 py-1.5 rounded-lg text-[10px] font-black transition ${chartMode==='bar'?'bg-white text-black shadow-lg':'opacity-40'}">BAR</button>
                        <button onclick="window.setUI('pie')" class="px-5 py-1.5 rounded-lg text-[10px] font-black transition ${chartMode==='pie'?'bg-white text-black shadow-lg':'opacity-40'}">PIE</button>
                        <button onclick="window.setUI('none')" class="px-5 py-1.5 rounded-lg text-[10px] font-black transition ${chartMode==='none'?'bg-white text-black shadow-lg':'opacity-40'}">HIDE</button>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] opacity-40 font-bold uppercase mr-3">Cumulative</span>
                        <span class="text-4xl font-light tabular-nums text-yellow-400">${total}</span>
                    </div>
                </div>

                <div class="question-box p-8 shrink-0">
                    <h1 class="text-3xl md:text-4xl font-medium text-center leading-snug text-white/95">${poll.question}</h1>
                </div>

                <div class="flex-1 min-h-0 flex gap-6 overflow-hidden">
                    ${chartMode !== 'none' ? `
                    <div class="flex-1 flex items-center justify-center bg-white/[0.01] rounded-[2.5rem] border border-white/5 p-10 chart-container">
                        ${chartMode === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>` : ''}

                    <div class="${chartMode !== 'none' ? 'w-5/12' : 'w-full'} flex flex-col gap-3 transition-all duration-700">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="flex-1 min-h-0">
                                <div class="option-card ${isLeader ? 'leading' : ''}">
                                    <div class="text-4xl font-light mr-6 shrink-0" style="color:${syncColors[i%4]}">${String.fromCharCode(65+i)}</div>
                                    <div class="flex-1 text-2xl font-light">${o.text || o.label}</div>
                                    ${isLeader ? '<div class="text-2xl ml-2 animate-bounce">👑</div>' : ''}
                                </div>
                            </div>`
                        }).join('')}
                    </div>
                </div>

                <button onclick="window.toggleAnswer(true)" class="shimmer-btn w-full h-20 rounded-2xl text-2xl font-bold tracking-[0.6em] shadow-2xl active:scale-[0.98] transition-transform">
                    揭 曉 專 家 權 威 分 析
                </button>

                <div id="reveal-layer" class="reveal-overlay ${window.ui.showAnswer ? 'active' : ''}">
                    <div class="max-w-6xl text-center px-12">
                        <p class="text-indigo-400 text-xs tracking-[1em] mb-16 uppercase opacity-60">Expert Authoritative Analysis</p>
                        <h2 class="expert-text text-4xl md:text-7xl leading-tight mb-28">「 ${expertMsg} 」</h2>
                        <div class="flex justify-center gap-8">
                            <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="px-12 py-5 rounded-full border border-white/10 font-bold hover:bg-white/5 transition tracking-widest">播放語音</button>
                            <button onclick="window.toggleAnswer(false)" class="px-16 py-5 rounded-full bg-white text-black font-black text-xl hover:scale-105 transition-all shadow-white/20 shadow-2xl">返回現場</button>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-[80%] gap-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (o.voteCount / total * 100) : 5;
                    return `
                    <div class="flex-1 flex flex-col items-center h-full justify-end">
                        <span class="mb-3 text-lg font-bold" style="color:${syncColors[i%4]}">${o.voteCount}</span>
                        <div class="w-full rounded-t-xl bar-anim" style="height:${Math.max(h, 5)}%; background:${syncColors[i%4]}; box-shadow: 0 0 30px ${syncColors[i%4]}22"></div>
                        <span class="mt-4 text-2xl font-light opacity-30">${String.fromCharCode(65+i)}</span>
                    </div>`;
                }).join('')}
            </div>`;

        const renderPie = (opts, total) => {
            if (total === 0) return `<div class="text-white/20 text-4xl italic">Waiting for votes...</div>`;
            let acc = 0;
            const paths = opts.map((o, i) => {
                const val = o.voteCount / total;
                if (val === 0) return '';
                const x1 = Math.cos(2 * Math.PI * acc);
                const y1 = Math.sin(2 * Math.PI * acc);
                acc += val;
                const x2 = Math.cos(2 * Math.PI * acc);
                const y2 = Math.sin(2 * Math.PI * acc);
                const flag = val > 0.5 ? 1 : 0;
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${flag} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}" stroke="#000" stroke-width="0.005"></path>`;
            }).join('');
            return `<svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-2/3 h-2/3 drop-shadow-[0_0_40px_rgba(255,255,255,0.05)]">${paths}</svg>`;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => {
            window.ui.showAnswer = s;
            const el = document.getElementById('reveal-layer');
            if (s) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 10); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 600); }
        };
        
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, '/'), (snap) => {
            const data = snap.val();
            if (!data) return;
            rawData = data;
            const polls = data.polls || data;
            const activeEntry = Object.entries(polls).find(([id, p]) => p.isActive);
            if (activeEntry && activeEntry[0] !== window.ui.currentPollId) {
                window.ui.showAnswer = false;
                window.ui.currentPollId = activeEntry[0];
            }
            render();
        });
    </script>
</body>
</html>
