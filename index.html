<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>最終除錯版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-10 font-sans">
    <div id="main-display">
        <h1 class="text-2xl animate-pulse">正在嘗試從 Firebase 撈取所有資料...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const display = document.getElementById('main-display');

        // 這次我們直接從根目錄監聽，看看裡面到底有什麼
        onValue(ref(db, '/'), (snapshot) => {
            const allData = snapshot.val();
            if (!allData) {
                display.innerHTML = "<h1>❌ 資料庫是空的</h1>";
                return;
            }

            // 尋找 polls 裡面的內容
            const polls = allData.polls;
            if (!polls) {
                display.innerHTML = "<h1>❌ 找不到 polls 資料夾</h1>";
                return;
            }

            // 暴力搜尋法：找出任何一個有 question 的物件
            let targetPoll = null;
            Object.values(polls).forEach(p => {
                if (p && p.question) targetPoll = p;
            });

            if (targetPoll) {
                let optionsHtml = "";
                const opts = targetPoll.options || {};
                Object.values(opts).forEach(o => {
                    optionsHtml += `
                        <div class="p-6 bg-blue-900/30 rounded-2xl mb-4 border border-blue-500/20 flex justify-between">
                            <span class="text-2xl font-bold">${o.text || o.label || "選項"}</span>
                            <span class="text-3xl font-black text-blue-400">${o.voteCount || 0} 票</span>
                        </div>
                    `;
                });

                display.innerHTML = `
                    <h1 class="text-5xl font-black mb-10 text-white">${targetPoll.question}</h1>
                    <div class="max-w-3xl">${optionsHtml}</div>
                `;
            } else {
                display.innerHTML = "<h1>❌ 找到 polls 了，但裡面沒有題目資料</h1>";
            }
        }, (err) => {
            display.innerHTML = `<h1 class="text-red-500">❌ 權限錯誤: ${err.message}</h1>`;
        });
    </script>
</body>
</html>
