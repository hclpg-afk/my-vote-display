<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>現場投票系統 - 輕量精緻版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%), #020617;
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; margin: 0; padding: 1.5rem 2rem;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            min-height: 18vh;
            display: flex; align-items: center; justify-content: center;
            animation: slideDown 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 0 1.5rem;
            height: 100%;
            display: flex; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }
        .option-card.leading {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
            transform: scale(1.03);
        }

        .reveal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(2, 6, 23, 0.98);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.6s ease;
        }
        .reveal-overlay.active { 
            display: flex; opacity: 1; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }

        .analysis-text {
            font-style: italic;
            font-weight: 700;
            line-height: 1.4;
            background: linear-gradient(to bottom, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(165, 180, 252, 0.5));
            transform: scale(0.9);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reveal-overlay.active .analysis-text { transform: scale(1); }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        
        .shimmer-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777);
            background-size: 200% auto;
            animation: shimmerMove 3s linear infinite;
        }
        @keyframes shimmerMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .bar-anim { transition: height 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .voice-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.5);
            transition: all 0.3s ease;
        }
        .voice-btn.speaking {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div id="root" class="h-full flex flex-col gap-6"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, lastActiveId: null, mode: 'bar', isSpeaking: false };
        const colors = ['#818cf8', '#34d399', '#f97316', '#f472b6'];

        const findAnalysis = (poll) => {
            let rawText = poll.expertAnswer || poll.expertAnalysis || poll.analysis || "分析資料準備中...";
            return rawText.replace("專家解密：", "<br/><span class='text-2xl opacity-70 mt-4 block text-indigo-300 font-bold'>—— 專家權威解密 ——</span><br/>");
        };

        const render = () => {
            if (!window.rawData) return;
            const activeEntry = Object.entries(window.rawData).find(([id, p]) => p.isActive === true);
            
            if (!activeEntry) {
                document.getElementById('root').innerHTML = `<div class="h-full flex items-center justify-center opacity-20 text-4xl italic">WAITING FOR STAGE...</div>`;
                return;
            }

            const [id, poll] = activeEntry;
            if (window.ui.lastActiveId !== id) {
                window.ui.lastActiveId = id;
                window.ui.showAnswer = false;
            }

            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const analysis = findAnalysis(poll);

            document.getElementById('root').innerHTML = `
                <div class="flex justify-between items-center shrink-0">
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2 bg-red-600/20 px-4 py-1.5 rounded-full border border-red-600/30">
                            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                            <span class="text-[10px] font-bold tracking-widest uppercase text-red-500">Stage Live</span>
                        </div>
                        <div class="flex bg-white/5 rounded-full p-1 border border-white/10">
                            <button onclick="window.setMode('bar')" class="px-4 py-1 rounded-full text-[10px] transition ${window.ui.mode==='bar'?'bg-indigo-600 shadow-lg':'opacity-50'}">長條圖</button>
                            <button onclick="window.setMode('pie')" class="px-4 py-1 rounded-full text-[10px] transition ${window.ui.mode==='pie'?'bg-indigo-600 shadow-lg':'opacity-50'}">圓餅圖</button>
                            <button onclick="window.setMode('hidden')" class="px-4 py-1 rounded-full text-[10px] transition ${window.ui.mode==='hidden'?'bg-slate-700':'opacity-50'}">隱藏數據</button>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] opacity-40 mr-3 tracking-widest uppercase">Cumulative Votes</span>
                        <span class="text-4xl font-bold tabular-nums text-yellow-400">${total}</span>
                    </div>
                </div>

                <div class="question-box px-16 py-6">
                    <h1 class="text-3xl md:text-4xl font-bold text-center leading-snug text-white/90">Q: ${poll.question}</h1>
                </div>

                <div class="flex-1 min-h-0 flex gap-8 mb-4">
                    ${window.ui.mode !== 'hidden' ? `
                    <div class="flex-1 bg-white/[0.02] rounded-[2.5rem] border border-white/5 p-10 flex items-center justify-center">
                        ${window.ui.mode === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${window.ui.mode === 'hidden' ? 'w-full max-w-4xl mx-auto' : 'w-5/12'} flex flex-col gap-4">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="flex-1 min-h-0" style="animation-delay: ${i*0.1}s">
                                <div class="option-card ${isLeader && window.ui.mode !== 'hidden' ? 'leading' : ''}">
                                    <div class="text-3xl font-bold mr-6 shrink-0" style="color:${colors[i%4]}">${String.fromCharCode(65+i)}</div>
                                    <div class="flex-1 text-xl font-medium truncate">${o.text || o.label}</div>
                                    ${(isLeader && window.ui.mode !== 'hidden') ? '<div class="text-2xl ml-2 animate-bounce">👑</div>' : ''}
                                </div>
                            </div>`
                        }).join('')}
                    </div>
                </div>

                <button onclick="window.toggleReveal(true)" class="shimmer-btn w-full h-16 rounded-2xl text-xl font-bold shadow-lg tracking-widest hover:scale-[1.01] active:scale-95 transition-transform">
                    揭 曉 專 家 權 威 分 析
                </button>

                <div id="reveal-layer" class="reveal-overlay ${window.ui.showAnswer ? 'active' : ''}">
                    <div class="max-w-5xl text-center px-10 relative z-10">
                        <p class="text-indigo-400 text-xs tracking-widest mb-8 uppercase opacity-60 font-bold">Authority Analysis</p>
                        <h2 class="text-3xl md:text-5xl leading-tight mb-12 analysis-text">「 ${analysis} 」</h2>
                        
                        <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                            <button id="voiceBtn" onclick="window.toggleSpeech()" class="voice-btn px-10 py-4 rounded-full font-bold text-lg flex items-center gap-3 transition-all">
                                <span>🔊 朗讀解析</span>
                            </button>
                            
                            <button onclick="window.toggleReveal(false)" class="px-16 py-4 rounded-full bg-white text-black font-bold text-lg hover:scale-105 transition-all">
                                返回計票現場
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderBar = (options, total) => `
            <div class="w-full h-full flex items-end justify-around gap-8">
                ${options.map((o, i) => {
                    const h = total > 0 ? (o.voteCount / total * 100) : 5;
                    return `
                    <div class="flex-1 flex flex-col items-center h-full justify-end">
                        <span class="mb-4 text-xl font-bold tabular-nums" style="color:${colors[i%4]}">${o.voteCount}</span>
                        <div class="w-full rounded-t-xl bar-anim" style="height:${Math.max(h, 5)}%; background:${colors[i%4]}; box-shadow: 0 0 20px ${colors[i%4]}33;"></div>
                        <span class="mt-4 text-xl font-bold opacity-30">${String.fromCharCode(65+i)}</span>
                    </div>`
                }).join('')}
            </div>
        `;

        const renderPie = (options, total) => {
            let currentPercent = 0;
            const slices = options.map((o, i) => {
                const percent = total > 0 ? (o.voteCount / total) : 0.25;
                const startX = Math.cos(2 * Math.PI * currentPercent);
                const startY = Math.sin(2 * Math.PI * currentPercent);
                currentPercent += percent;
                const endX = Math.cos(2 * Math.PI * currentPercent);
                const endY = Math.sin(2 * Math.PI * currentPercent);
                const largeArc = percent > 0.5 ? 1 : 0;
                return `<path d="M 0 0 L ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} Z" fill="${colors[i%4]}" />`;
            }).join('');
            return `<div class="relative w-[320px] h-[320px]"><svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-full h-full">${slices}</svg></div>`;
        };

        window.setMode = (m) => { window.ui.mode = m; render(); };

        // 修正後的語音切換邏輯
        window.toggleSpeech = () => {
            const btn = document.getElementById('voiceBtn');
            
            if (window.ui.isSpeaking) {
                // 如果正在播放，則停止
                window.speechSynthesis.cancel();
                window.ui.isSpeaking = false;
                btn.innerHTML = '<span>🔊 朗讀解析</span>';
                btn.classList.remove('speaking');
            } else {
                // 如果沒在播放，則開始
                const activeEntry = Object.values(window.rawData).find(p => p.isActive);
                const text = activeEntry?.expertAnswer || activeEntry?.expertAnalysis || activeEntry?.analysis || "";
                
                if (text) {
                    window.speechSynthesis.cancel(); // 清除排隊
                    const utterance = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, '')); // 移除HTML標籤
                    utterance.lang = 'zh-TW';
                    utterance.rate = 0.95;
                    
                    utterance.onend = () => {
                        window.ui.isSpeaking = false;
                        btn.innerHTML = '<span>🔊 朗讀解析</span>';
                        btn.classList.remove('speaking');
                    };

                    window.speechSynthesis.speak(utterance);
                    window.ui.isSpeaking = true;
                    btn.innerHTML = '<span>⏹ 停止朗讀</span>';
                    btn.classList.add('speaking');
                }
            }
        };

        window.toggleReveal = (s) => {
            window.ui.showAnswer = s;
            const el = document.getElementById('reveal-layer');
            if (s) { 
                el.style.display = 'flex'; 
                setTimeout(() => el.classList.add('active'), 50);
            } else { 
                el.classList.remove('active'); 
                window.speechSynthesis.cancel(); // 關閉視窗強制停止
                window.ui.isSpeaking = false;
                setTimeout(() => el.style.display = 'none', 600); 
            }
        };

        onValue(ref(db, 'polls'), (snap) => {
            window.rawData = snap.val();
            render();
        });
    </script>
</body>
</html>
