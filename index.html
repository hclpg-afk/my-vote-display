<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 旗艦流光對齊版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at 50% -20%, #2e1065 0%, transparent 70%), #050508;
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; margin: 0; padding: 1rem 2rem;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 題幹區塊：放大感 */
        .question-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            min-height: 22vh;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.1);
        }

        /* 選項卡片：對齊與縮減空白 */
        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 0.5rem 2rem;
            height: 100%;
            display: flex; align-items: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .option-card.leading {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.2);
            transform: scale(1.02);
        }

        /* 強化流光按鈕 */
        .shimmer-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777, #4f46e5);
            background-size: 200% auto;
            animation: shimmerMove 3s linear infinite;
        }
        @keyframes shimmerMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .shimmer-btn::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(60deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg); animation: lightPass 4s infinite;
        }
        @keyframes lightPass { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

        /* 揭曉視窗動畫 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.5s ease;
        }
        .reveal-overlay.active { display: flex; opacity: 1; }
        .reveal-content {
            transform: scale(0.9) translateY(20px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .reveal-overlay.active .reveal-content { transform: scale(1) translateY(0); }

        .bar-anim { transition: height 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>

                    foundText = obj;
                } else if (obj && typeof obj === 'object') {
                    Object.values(obj).forEach(deepScan);
                }
            };
            deepScan(poll);
            return foundText || "數據分析完成，請參考現場專家講解。";

                        <span class="text-[10px] font-bold tracking-widest uppercase">Stage Live</span>
                    </div>
                    <div class="flex bg-white/10 p-1 rounded-xl">

                    <div class="text-right">
                        <span class="text-[10px] opacity-40 font-bold uppercase mr-3">Cumulative</span>
                        <span class="text-4xl font-light tabular-nums text-yellow-400">${total}</span>

                </div>

                <div class="flex-1 min-h-0 flex gap-6 overflow-hidden">
                    ${chartMode !== 'none' ? `
                    <div class="flex-1 flex items-end justify-around bg-white/[0.02] rounded-[2.5rem] border border-white/5 p-10 gap-8">

                            </div>`
                        }).join('')}
                    </div>` : ''}
