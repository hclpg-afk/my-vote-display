<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票系統 - 專業展示版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { 
            background: radial-gradient(circle at center, #2d1b69 0%, #050514 100%);
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .answer-box { background: rgba(255, 255, 255, 0.03); border: 2px solid #fbbf24; border-radius: 2.5rem; }
        .btn-orange { background: linear-gradient(90deg, #f59e0b, #ea580c); box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3); }
        .bar-green { background: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); min-height: 4px; transition: height 1s ease-out; }
    </style>
</head>
<body class="text-white min-h-screen p-8">
    <div id="root" class="max-w-[1400px] mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let showChart = true;
        let showAnswer = false;

        onValue(ref(db, 'polls'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 1. 抓取當前題目
            const target = Object.values(data).find(p => p.isActive) || Object.values(data)[0];
            
            // 2. 處理選項數據 (增加容錯，確保圖表出得來)
            const rawOptions = target.options || {};
            const options = Array.isArray(rawOptions) ? rawOptions : Object.values(rawOptions);
            const totalVotes = options.reduce((sum, opt) => sum + (Number(opt.voteCount) || 0), 0);
            
            // 3. 多路徑抓取「專家解答」
            const expertMsg = target.expertAnalysis || target.analysis || target.answer || "後台尚未輸入解析文字";

            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="flex items-center gap-3 mb-6 opacity-40">
                    <span class="bg-red-500 px-3 py-0.5 rounded-full text-[10px] font-bold">● LIVE</span>
                    <span class="text-xs">已投 ${totalVotes} 票</span>
                    <button onclick="window.toggleChart()" class="ml-auto text-[10px] border border-white/20 px-2 py-1 rounded hover:bg-white/10">
                        ${showChart ? '隱藏圖表' : '顯示圖表'}
                    </button>
                </div>

                <h1 class="text-4xl font-bold mb-10 leading-snug tracking-tight">
                    🧠 ${target.question}
                </h1>

                <div class="grid grid-cols-12 gap-8 items-start">
                    <div class="col-span-12 lg:col-span-5 ${showChart ? '' : 'hidden'}">
                        <div class="glass-card h-[400px] flex items-end justify-around p-8 pt-16">
                            ${options.map((opt, i) => {
                                const val = Number(opt.voteCount) || 0;
                                const height = totalVotes > 0 ? (val / totalVotes * 100) : 0;
                                return `
                                    <div class="flex flex-col items-center gap-3 w-full h-full justify-end">
                                        <span class="text-lg font-bold">${val}</span>
                                        <div class="bar-green w-12 rounded-t-lg" style="height: ${height}%"></div>
                                        <span class="opacity-30 text-xs font-bold">${String.fromCharCode(65+i)}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="${showChart ? 'lg:col-span-7' : 'lg:col-span-12'} col-span-12 space-y-4">
                        ${options.map((opt, i) => {
                            const val = Number(opt.voteCount) || 0;
                            const per = totalVotes > 0 ? Math.round(val/totalVotes*100) : 0;
                            return `
                                <div class="glass-card p-5 flex justify-between items-center px-8 border-l-2 border-blue-500/30">
                                    <div class="flex items-center gap-5">
                                        <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-300 font-bold text-xs">${String.fromCharCode(65+i)}</div>
                                        <span class="text-lg font-medium">${opt.text || opt.label}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-2xl font-bold">${val}</span>
                                        <span class="text-[10px] opacity-20 block">${per}%</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}

                        <button onclick="window.toggleAnswer()" class="w-full btn-orange py-4 rounded-2xl text-lg font-bold flex items-center justify-center gap-2 mt-4">
                            💡 公佈答案
                        </button>

                        <div class="${showAnswer ? 'block' : 'hidden'} mt-6">
                            <div class="answer-box p-8">
                                <div class="flex items-center justify-between mb-6">
                                    <div class="flex items-center gap-3">
                                        <span class="text-2xl text-yellow-400">💡</span>
                                        <h2 class="text-xl font-bold text-yellow-400 font-bold">專家解答</h2>
                                    </div>
                                    <div class="flex items-center gap-2 opacity-50 scale-75">
                                        <span class="text-[10px]">慢 正常 快 很快</span>
                                        <button class="bg-yellow-400 text-black px-3 py-1 rounded font-bold text-[10px]">🔊 朗讀</button>
                                    </div>
                                </div>
                                <p class="text-lg leading-relaxed text-yellow-50/80">${expertMsg}</p>
                                <button onclick="window.toggleAnswer()" class="mt-6 opacity-20 text-[10px] underline">隱藏解答</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        window.toggleChart = () => { showChart = !showChart; }; 
        window.toggleAnswer = () => { showAnswer = !showAnswer; };
    </script>
</body>
</html>
