<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 穩定最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden; /* 防止出現捲軸 */
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* 綜藝感標題：立體感、發光 */
        .header-box {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            padding: 4px;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.4);
        }
        .header-content {
            background: #0a0a20;
            padding: 1.5rem 3rem;
            border-radius: 1.3rem;
        }

        /* 票數數字：黃金質感 */
        .vote-display {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px #442200);
            line-height: 1;
        }

        /* 選項按鈕：飽滿佈局 */
        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .variety-card:hover {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 揭曉全屏層 */
        .reveal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            background-image: radial-gradient(circle, #2d1b69 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flashIn 0.5s ease-out;
        }
        @keyframes flashIn {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 自動調整圓餅圖大小 */
        .pie-container {
            width: 100%;
            height: 100%;
            max-width: 400px;
            max-height: 400px;
        }
    </style>
</head>
<body class="p-8">

    <div id="root" class="h-full flex flex-col max-w-[1600px] mx-auto w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'bar' };
        let rawData = null;

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const poll = Object.values(rawData).find(p => p.isActive) || Object.values(rawData)[0];
            
            // 🔍 暴力數據抓取機制：搜尋所有可能的解析欄位
            const getExpertText = (p) => {
                return p.expertAnalysis || p.analysis || p.expertAnswer || p.answer || p.desc || "數據載入中...";
            };
            const expertMsg = getExpertText(poll);
            
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);

            root.innerHTML = `
                <div class="header-box self-center mb-10">
                    <div class="header-content">
                        <h1 class="text-5xl font-black tracking-tight text-white">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-10 items-center overflow-hidden mb-6">
                    
                    <div class="col-span-6 bg-white/5 rounded-[2.5rem] p-10 h-full flex flex-col items-center justify-center border border-white/10 relative">
                        <div class="absolute top-6 right-6 flex gap-2">
                            <button onclick="window.setUI('bar')" class="px-4 py-2 rounded-lg text-xs font-bold ${window.ui.chart==='bar'?'bg-cyan-500':'bg-white/10'} transition">BAR</button>
                            <button onclick="window.setUI('pie')" class="px-4 py-2 rounded-lg text-xs font-bold ${window.ui.chart==='pie'?'bg-cyan-500':'bg-white/10'} transition">PIE</button>
                        </div>

                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>

                    <div class="col-span-6 flex flex-col gap-4 h-full">
                        ${options.map((o, i) => `
                            <div class="variety-card flex-1 rounded-[1.5rem] px-8 py-4 flex justify-between items-center">
                                <div class="flex items-center gap-6">
                                    <div class="w-12 h-12 rounded-full bg-white text-blue-900 flex items-center justify-center text-2xl font-black">${String.fromCharCode(65+i)}</div>
                                    <div class="text-3xl font-bold">${o.text || o.label}</div>
                                </div>
                                <div class="text-right">
                                    <div class="vote-display text-4xl">${o.voteCount}</div>
                                    <div class="text-[10px] font-bold opacity-30 tracking-widest uppercase">Votes</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button onclick="window.toggleAnswer(true)" class="w-full bg-gradient-to-r from-red-600 to-pink-600 py-6 rounded-[2rem] text-3xl font-black shadow-2xl hover:brightness-125 transition-all active:scale-95 animate-pulse mb-4">
                    🔥 揭曉專家分析 REVEAL ANALYSIS
                </button>

                ${window.ui.showAnswer ? `
                    <div class="reveal-overlay p-10">
                        <div class="max-w-5xl w-full text-center">
                            <div class="inline-block bg-amber-400 text-black px-12 py-2 rounded-full text-sm font-black mb-8">EXPERT ANALYSIS</div>
                            <h2 class="text-6xl font-black leading-tight mb-16 italic text-white drop-shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                                「 ${expertMsg} 」
                            </h2>
                            <div class="flex justify-center gap-6">
                                <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="bg-cyan-500 text-white px-16 py-6 rounded-full text-2xl font-black hover:scale-105 transition shadow-xl">🔊 播放解答</button>
                                <button onclick="window.toggleAnswer(false)" class="bg-white/10 text-white px-16 py-6 rounded-full text-2xl font-black hover:bg-white/20 transition">返回</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-[350px] gap-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="vote-display text-3xl mb-4">${o.voteCount}</div>
                            <div class="w-full bg-gradient-to-t from-blue-600 to-cyan-300 rounded-t-xl shadow-[0_0_20px_rgba(34,211,238,0.3)]" style="height: ${h}%"></div>
                            <div class="mt-4 font-black text-xl text-white/20">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const colors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                const x1 = Math.cos(2 * Math.PI * curr); const y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr); const y2 = Math.sin(2 * Math.PI * curr);
                const large = p > 0.5 ? 1 : 0;
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[i%4]}"></path>`;
            }).join('');
            return `
                <div class="pie-container relative">
                    <svg viewBox="-1.02 -1.02 2.04 2.04" class="transform -rotate-90 drop-shadow-2xl">${paths}</svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="text-xs font-bold opacity-30">TOTAL</div>
                        <div class="text-5xl font-black">${total}</div>
                    </div>
                </div>
            `;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'zh-TW'; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            rawData = snap.val();
            render();
        });
    </script>
</body>
</html>
