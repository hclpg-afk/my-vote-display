<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 綜藝之王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body { 
            background: #020024;
            background: radial-gradient(circle, #1a1a4d 0%, #020205 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 綜藝標題看板 */
        .show-header {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            padding: 2px;
            border-radius: 2rem;
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.4);
        }
        .show-header-inner {
            background: #050510;
            padding: 2rem 4rem;
            border-radius: 1.8rem;
        }

        /* 票數數字：黃金立體感 */
        .gold-num {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff7ad 0%, #ffa700 50%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 0px #8b4513);
            line-height: 1;
        }

        /* 選項按鈕：飽滿質感 */
        .variety-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .variety-btn:hover {
            border-color: #ffd700;
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.1);
        }

        /* 最終揭曉動畫 */
        .flash-bang {
            animation: flash 0.5s ease-out;
        }
        @keyframes flash {
            0% { background: white; opacity: 1; }
            100% { background: transparent; opacity: 0; }
        }

        .reveal-pop {
            animation: revealPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes revealPop {
            from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .bar-glow { box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); transition: height 1s ease-out; }
    </style>
</head>
<body class="p-8">

    <div id="root" class="w-full max-w-[1600px] h-full flex flex-col justify-center"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.state = { showAnswer: false, chart: 'bar' };
        let lastPollData = null;

        const render = () => {
            if (!lastPollData) return;
            const root = document.getElementById('root');
            const poll = Object.values(lastPollData).find(p => p.isActive) || Object.values(lastPollData)[0];
            
            // 數據三保險機制
            const analysisText = poll.expertAnalysis || poll.analysis || poll.answer || "⚠️ 專家解析尚未就緒";
            
            const opts = Object.values(poll.options || {});
            const total = opts.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);

            root.innerHTML = `
                <div class="show-header self-center mb-16">
                    <div class="show-header-inner">
                        <h1 class="text-5xl md:text-6xl font-black tracking-tighter bg-gradient-to-b from-white to-gray-400 bg-clip-text text-transparent">
                            Q: ${poll.question}
                        </h1>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-12 items-center">
                    
                    <div class="col-span-12 lg:col-span-6 bg-white/5 rounded-[3rem] p-12 border border-white/10 h-[550px] flex items-end justify-around gap-6 shadow-2xl">
                        ${opts.map((o, i) => {
                            const h = total > 0 ? (Number(o.voteCount) / total * 90) : 5;
                            return `
                                <div class="flex-1 flex flex-col items-center h-full justify-end">
                                    <div class="gold-num text-5xl mb-6">${o.voteCount}</div>
                                    <div class="w-full bg-gradient-to-t from-blue-600 via-cyan-400 to-white rounded-t-2xl bar-glow" style="height: ${h}%"></div>
                                    <div class="mt-6 text-2xl font-black text-cyan-400 uppercase tracking-tighter">${String.fromCharCode(65+i)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="col-span-12 lg:col-span-6 space-y-6">
                        ${opts.map((o, i) => `
                            <div class="variety-btn rounded-[2.5rem] p-8 flex justify-between items-center group">
                                <div class="flex items-center gap-8">
                                    <div class="w-16 h-16 rounded-full bg-gradient-to-br from-yellow-400 to-orange-600 flex items-center justify-center text-3xl font-black text-white shadow-lg">
                                        ${String.fromCharCode(65+i)}
                                    </div>
                                    <div class="text-4xl font-bold">${o.text || o.label}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-amber-500 font-black text-5xl">${o.voteCount}</div>
                                    <div class="text-xs font-bold opacity-30 tracking-widest uppercase">Votes</div>
                                </div>
                            </div>
                        `).join('')}

                        <button onclick="window.toggleAnswer(true)" class="w-full mt-10 bg-gradient-to-r from-red-600 via-pink-600 to-purple-600 py-10 rounded-[3rem] text-4xl font-black shadow-[0_20px_50px_rgba(220,38,38,0.4)] hover:scale-105 active:scale-95 transition-all">
                            💥 公佈專家解答 💥
                        </button>
                    </div>
                </div>

                ${window.state.showAnswer ? `
                    <div class="fixed inset-0 z-[9999] flex items-center justify-center p-10 bg-black/95">
                        <div class="flash-bang fixed inset-0 z-0"></div>
                        <div class="reveal-pop bg-gradient-to-b from-blue-900 to-black p-20 rounded-[5rem] border-4 border-amber-400 shadow-[0_0_100px_rgba(251,191,36,0.3)] max-w-6xl w-full text-center relative z-10">
                            <div class="inline-block bg-amber-400 text-black px-12 py-3 rounded-full text-xl font-black mb-12">THE EXPERT ANSWER</div>
                            <p class="text-7xl font-black leading-tight mb-16 drop-shadow-2xl">
                                「 ${analysisText} 」
                            </p>
                            <div class="flex justify-center gap-8">
                                <button onclick="window.speak('${analysisText.replace(/'/g, "\\'")}')" class="bg-white text-black px-16 py-6 rounded-full text-2xl font-black hover:bg-cyan-400 transition-colors">🔊 朗讀解答</button>
                                <button onclick="window.toggleAnswer(false)" class="bg-white/10 text-white px-16 py-6 rounded-full text-2xl font-black hover:bg-white/20">返回統計</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        window.toggleAnswer = (s) => { window.state.showAnswer = s; render(); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'zh-TW'; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        };

        // 數據監聽
        onValue(ref(db, 'polls'), (snap) => {
            const val = snap.val();
            if (val) {
                lastPollData = val;
                render();
            }
        });
    </script>
</body>
</html>
