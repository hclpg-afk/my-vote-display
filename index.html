<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - FINAL STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { background: #050508; color: white; font-family: 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .question-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; position: relative; overflow: hidden; }
        .question-box::after { content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-20deg); animation: scan 6s infinite; }
        @keyframes scan { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }
        .reveal-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.98); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 99; opacity: 0; transition: 0.5s; }
        .reveal-overlay.active { display: flex; opacity: 1; }
        .expert-text { font-style: italic; font-weight: 700; transform: scale(0.9) skewX(-10deg); transition: 0.8s; }
        .active .expert-text { transform: scale(1) skewX(-10deg); }
    </style>
</head>
<body>

    <div id="root" class="h-full flex flex-col p-8 gap-6">
        <div class="h-full flex items-center justify-center text-xl animate-pulse">正在連線至現場數據庫...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.ui = { chart: 'bar', showAnswer: false };
        const colors = ['#818cf8', '#34d399', '#fbbf24', '#f472b6'];

        function render(data) {
            try {
                const root = document.getElementById('root');
                const polls = data.polls || data;
                // 找出 isActive 為 true 的題目
                const activeId = Object.keys(polls).find(id => polls[id].isActive === true);
                
                if (!activeId) {
                    root.innerHTML = `<div class="h-full flex items-center justify-center opacity-30 text-2xl italic">等待題目切換中...</div>`;
                    return;
                }

                const poll = polls[activeId];
                const options = Object.values(poll.options || {});
                const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
                const maxVotes = Math.max(...options.map(o => o.voteCount));
                
                // 抓取專家答案 (嘗試多個可能欄位)
                const msg = poll.expertAnalysis || poll.analysis || poll.description || "專家正在準備精闢分析...";

                root.innerHTML = `
                    <div class="flex justify-between items-center shrink-0">
                        <div class="flex items-center gap-2 bg-red-600/20 px-4 py-1.5 rounded-full border border-red-600/30">
                            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                            <span class="text-[10px] font-black tracking-widest uppercase text-red-500">Live Stage</span>
                        </div>
                        <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                            <button onclick="setUI('bar')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='bar'?'bg-white text-black':'opacity-40'}">BAR</button>
                            <button onclick="setUI('pie')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='pie'?'bg-white text-black':'opacity-40'}">PIE</button>
                            <button onclick="setUI('none')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='none'?'bg-white text-black':'opacity-40'}">HIDE</button>
                        </div>
                        <div class="text-right text-4xl font-light text-yellow-400 tabular-nums">${total}</div>
                    </div>

                    <div class="question-box p-8 shrink-0 flex items-center justify-center">
                        <h1 class="text-3xl md:text-4xl font-medium text-center leading-relaxed text-white/95">${poll.question}</h1>
                    </div>

                    <div class="flex-1 min-h-0 flex gap-6">
                        ${window.ui.chart !== 'none' ? `
                        <div class="flex-1 flex items-center justify-center bg-white/[0.01] rounded-[2.5rem] border border-white/5 p-10">
                            ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                        </div>` : ''}

                        <div class="${window.ui.chart !== 'none' ? 'w-5/12' : 'w-full'} flex flex-col gap-3">
                            ${options.map((o, i) => `
                                <div class="flex-1 bg-white/5 border border-white/10 rounded-2xl flex items-center px-8 ${o.voteCount === maxVotes && maxVotes > 0 ? 'border-yellow-500 bg-white/10' : ''}">
                                    <span class="text-4xl font-light mr-6" style="color:${colors[i%4]}">${String.fromCharCode(65+i)}</span>
                                    <span class="text-2xl font-light">${o.text || o.label}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <button onclick="toggleReveal(true)" class="w-full h-20 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 rounded-2xl text-2xl font-bold tracking-[0.5em] shadow-2xl active:scale-95 transition">
                        揭 曉 專 家 權 威 分 析
                    </button>

                    <div id="layer" class="reveal-overlay ${window.ui.showAnswer ? 'active' : ''}">
                        <div class="text-center px-12">
                            <h2 class="expert-text text-4xl md:text-7xl leading-tight mb-20">「 ${msg} 」</h2>
                            <button onclick="toggleReveal(false)" class="px-16 py-5 bg-white text-black rounded-full font-black text-xl">返回現場</button>
                        </div>
                    </div>
                `;
            } catch (err) { console.error("渲染出錯:", err); }
        }

        function renderBar(opts, total) {
            return `<div class="flex items-end justify-around w-full h-[80%] gap-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (o.voteCount / total * 100) : 5;
                    return `<div class="flex-1 flex flex-col items-center justify-end h-full">
                        <div class="w-full rounded-t-xl transition-all duration-1000" style="height:${h}%; background:${colors[i%4]}; box-shadow: 0 0 30px ${colors[i%4]}44"></div>
                        <span class="mt-4 text-xl font-bold" style="color:${colors[i%4]}">${o.voteCount}</span>
                    </div>`;
                }).join('')}
            </div>`;
        }

        function renderPie(opts, total) {
            if (total === 0) return `<div class="opacity-20 italic">No Data</div>`;
            let acc = 0;
            const paths = opts.map((o, i) => {
                const val = o.voteCount / total; if (val === 0) return '';
                const x1 = Math.cos(2 * Math.PI * acc); const y1 = Math.sin(2 * Math.PI * acc);
                acc += val;
                const x2 = Math.cos(2 * Math.PI * acc); const y2 = Math.sin(2 * Math.PI * acc);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${val > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${colors[i%4]}"></path>`;
            }).join('');
            return `<svg viewBox="-1 -1 2 2" class="w-2/3 h-2/3 transform -rotate-90">${paths}</svg>`;
        }

        window.setUI = (c) => { window.ui.chart = c; onValue(ref(db, '/'), (s) => render(s.val()), {onlyOnce: true}); };
        window.toggleReveal = (s) => { 
            window.ui.showAnswer = s; 
            const el = document.getElementById('layer');
            if(s) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 50); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 500); }
        };

        onValue(ref(db, '/'), (snap) => {
            const data = snap.val();
            if (data) render(data);
        });
    </script>
</body>
</html>
