<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const { useState, useEffect } = React;
        const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const COLORS = ['#22c55e', '#3b82f6', '#f97316', '#8b5cf6', '#ec4899', '#14b8a6'];

        function App() {
            const [poll, setPoll] = useState(null);
            const [showCharts, setShowCharts] = useState(true);

            useEffect(() => {
                // 修改路徑，嘗試抓取整個 polls 分支來過濾出 isActive 的題目
                const pollsRef = ref(db, 'polls');
                return onValue(pollsRef, (snapshot) => {
                    const allPolls = snapshot.val();
                    if (allPolls) {
                        // 找到目前正在啟動 (isActive) 的那一題
                        const activePoll = Object.values(allPolls).find(p => p.isActive === true) || Object.values(allPolls)[0];
                        setPoll(activePoll);
                    }
                });
            }, []);

            if (!poll) return <div className="flex h-screen items-center justify-center text-2xl font-bold text-slate-400">正在連線至資料庫...</div>;

            const data = poll.options?.map((opt, index) => ({
                name: opt.text || opt.label || "未命名選項",
                value: opt.voteCount || 0
            })) || [];

            return (
                <div className="min-h-screen bg-slate-950 p-6 md:p-12 text-white font-sans">
                    <div className="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div className="flex-1">
                            <h2 className="text-blue-500 text-sm font-black tracking-widest mb-2">LIVE RESULTS</h2>
                            <h1 className="text-3xl md:text-5xl font-extrabold leading-tight">{poll.question}</h1>
                        </div>
                        <button 
                            onClick={() => setShowCharts(!showCharts)}
                            className="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black shadow-lg transition-all active:scale-95 text-lg"
                        >
                            {showCharts ? "👀 隱藏圖表" : "📊 顯示圖表"}
                        </button>
                    </div>

                    <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-10">
                        <div className={`transition-all duration-700 ${showCharts ? 'lg:w-1/2' : 'w-full'}`}>
                            <div className="bg-slate-900 rounded-3xl p-8 border border-white/10 shadow-2xl">
                                <div className="space-y-4">
                                    {data.map((entry, index) => (
                                        <div key={index} className="flex items-center justify-between p-6 bg-white/5 rounded-2xl">
                                            <div className="text-xl md:text-2xl font-bold break-words flex-1 pr-4">
                                                <span className="opacity-30 mr-3">{index + 1}.</span>{entry.name}
                                            </div>
                                            <div className="text-3xl font-black text-blue-400">{entry.value} 票</div>
                                        </div>
                                    ))}
                                </div>
                                {poll.expertAnswer && (
                                    <div className="mt-8 p-6 bg-emerald-500/20 border border-emerald-500/50 rounded-2xl">
                                        <p className="text-emerald-400 font-bold mb-1">💡 解答說明</p>
                                        <p className="text-xl">{poll.expertAnswer}</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {showCharts && (
                            <div className="lg:w-1/2 space-y-8">
                                <div className="bg-slate-900 rounded-3xl p-6 h-[400px] border border-white/10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={data} cx="50%" cy="50%" innerRadius={70} outerRadius={120} paddingAngle={5} dataKey="value">
                                                {data.map((_, index) => (
                                                    <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                ))}
                                            </Pie>
                                            <Tooltip contentStyle={{backgroundColor: '#0f172a', border: 'none', borderRadius: '12px'}} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="bg-slate-900 rounded-3xl p-6 h-[300px] border border-white/10 text-slate-900">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={data}>
                                            <XAxis dataKey="name" hide />
                                            <YAxis hide />
                                            <Tooltip cursor={{fill: '#ffffff05'}} contentStyle={{backgroundColor: '#0f172a', border: 'none', borderRadius: '12px', color: '#fff'}} />
                                            <Bar dataKey="value" radius={[10, 10, 0, 0]}>
                                                {data.map((_, index) => (
                                                    <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</head>
<body class="bg-slate-950"><div id="root"></div></body>
</html>
