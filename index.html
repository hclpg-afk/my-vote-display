<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>The Mastermind - 最終視覺重塑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300;500;900&display=swap');
        
        body { 
            background: #000;
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* 質感反差：極粗與極細 */
        .text-hero { font-weight: 900; letter-spacing: -0.05em; }
        .text-detail { font-weight: 100; letter-spacing: 0.2em; opacity: 0.5; }

        /* 玻璃舞台卡片 */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
        }

        /* 解答揭曉動畫：全場肅靜模式 */
        .reveal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .reveal-card {
            background: linear-gradient(145deg, #1e1b4b, #0f172a);
            border: 1px solid rgba(251, 191, 36, 0.4);
            box-shadow: 0 0 100px rgba(251, 191, 36, 0.1);
            transform: scale(0.9);
            animation: popUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popUp {
            to { transform: scale(1); }
        }

        .bar-anim { transition: height 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="p-20">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'bar' };
        let currentPoll = null;

        const render = () => {
            if (!currentPoll) return;
            const root = document.getElementById('root');
            const opts = Object.values(currentPoll.options || {});
            const total = opts.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const expertMsg = currentPoll.expertAnalysis || currentPoll.analysis || "正在接收專家數據...";

            root.innerHTML = `
                <div class="fixed top-8 right-8 z-[200] flex gap-2 opacity-30 hover:opacity-100 transition-opacity">
                    <button onclick="window.setUI('bar')" class="px-4 py-2 bg-white/10 rounded-lg text-[10px] font-bold">BAR</button>
                    <button onclick="window.setUI('pie')" class="px-4 py-2 bg-white/10 rounded-lg text-[10px] font-bold">PIE</button>
                </div>

                <div class="text-center mb-24 reveal-item">
                    <div class="text-detail text-sm mb-4">AUDIENCE REAL-TIME FEEDBACK</div>
                    <h1 class="text-7xl font-bold tracking-tight text-white/95">Q: ${currentPoll.question}</h1>
                </div>

                <div class="flex-grow grid grid-cols-12 gap-20 items-center">
                    <div class="col-span-7 flex justify-center h-[500px]">
                        ${window.ui.chart === 'bar' ? renderBar(opts, total) : renderPie(opts, total)}
                    </div>

                    <div class="col-span-5 space-y-6">
                        ${opts.map((o, i) => `
                            <div class="glass-panel px-12 py-8 flex justify-between items-center group">
                                <div>
                                    <div class="text-blue-500 font-black text-2xl mb-1">${String.fromCharCode(65+i)}</div>
                                    <div class="text-3xl font-light text-white/80">${o.text || o.label}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-hero text-6xl">${o.voteCount}</div>
                                    <div class="text-detail text-[10px]">VOTES</div>
                                </div>
                            </div>
                        `).join('')}
                        
                        <button onclick="window.toggleAnswer(true)" class="w-full bg-white text-black text-2xl font-black py-8 rounded-[3rem] hover:bg-amber-400 transition-colors shadow-2xl mt-12">
                            REVEAL THE TRUTH 💡
                        </button>
                    </div>
                </div>

                ${window.ui.showAnswer ? `
                    <div class="reveal-overlay">
                        <div class="reveal-card p-24 max-w-6xl w-full rounded-[4rem]">
                            <div class="flex justify-between items-start mb-16">
                                <div>
                                    <div class="text-amber-500 font-black tracking-widest text-sm mb-2 uppercase">Analysis Report</div>
                                    <h2 class="text-5xl font-bold">專家深度解析</h2>
                                </div>
                                <div class="flex gap-4">
                                    <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="bg-amber-500 text-black px-10 py-4 rounded-full font-black hover:scale-105 transition-transform shadow-lg">🔊 朗讀解答</button>
                                    <button onclick="window.toggleAnswer(false)" class="bg-white/10 px-10 py-4 rounded-full font-bold hover:bg-white/20 transition-colors">返回</button>
                                </div>
                            </div>
                            <p class="text-5xl leading-[1.6] font-light text-white/95 italic">
                                「 ${expertMsg} 」
                            </p>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end gap-12 w-full px-10">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center">
                            <div class="text-hero text-4xl mb-6 text-blue-400">${o.voteCount}</div>
                            <div class="w-full bg-gradient-to-t from-blue-600 to-cyan-400 rounded-t-3xl shadow-[0_0_50px_rgba(34,211,238,0.2)] bar-anim" style="height: ${h}%"></div>
                            <div class="text-detail mt-6 text-sm">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                const x1 = Math.cos(2 * Math.PI * curr); const y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr); const y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="rgba(59,130,246,${0.2 + (i*0.2)})" stroke="#000" stroke-width="0.01"></path>`;
            }).join('');
            return `
                <div class="relative w-[450px] h-[450px]">
                    <svg viewBox="-1.05 -1.05 2.1 2.1" class="transform -rotate-90 drop-shadow-[0_50px_80px_rgba(0,0,0,0.8)]">${paths}</svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="text-detail text-sm mb-1">AUDIENCE</div>
                        <div class="text-hero text-7xl">${total}</div>
                    </div>
                </div>
            `;
        };

        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'zh-TW'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { 
            window.ui.showAnswer = s; 
            if(!s) window.speechSynthesis.cancel();
            render(); 
        };

        onValue(ref(db, 'polls'), (snap) => {
            currentPoll = Object.values(snap.val()).find(p => p.isActive) || Object.values(snap.val())[0];
            render();
        });
    </script>
</body>
</html>
