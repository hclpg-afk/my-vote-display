<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統 - 精美版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            background: radial-gradient(circle at center, #3c2a7a 0%, #0c0a2a 100%);
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }
        .neon-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .neon-border { border: 2px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .neon-border:hover { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .bar-gradient { background: linear-gradient(to top, #10b981, #34d399); box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="text-white min-h-screen p-8 md:p-12">
    <div id="root" class="max-w-[1600px] mx-auto">
        <div class="h-screen flex items-center justify-center animate-pulse text-lg opacity-50 tracking-widest">📡 正在從現場同步數據...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        initializeApp(firebaseConfig);
        const db = getDatabase();
        const root = document.getElementById('root');
        
        // 你的投票網址，用於生成 QR Code
        const voteUrl = "https://voting-event.web.app/vote";

        onValue(ref(db, 'polls'), (snapshot) => {
            const polls = snapshot.val();
            if (!polls) return;

            // 尋找 isActive 的題目
            const target = Object.values(polls).find(p => p.isActive) || Object.values(polls)[0];
            const options = target.options ? Object.values(target.options) : [];
            const totalVotes = options.reduce((sum, o) => sum + (o.voteCount || 0), 0);
            
            // 是否顯示答案 (專家解答)
            const showAnswer = target.showAnswer === true;

            let optionsHtml = options.map((opt, i) => {
                const percent = totalVotes > 0 ? Math.round((opt.voteCount || 0) / totalVotes * 100) : 0;
                return `
                    <div class="neon-card neon-border p-6 flex justify-between items-center mb-4">
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-xl font-black text-green-400 border border-green-500/20">${String.fromCharCode(65 + i)}</div>
                            <span class="text-2xl font-bold tracking-tight">${opt.text || opt.label}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-4xl font-black">${opt.voteCount || 0} <span class="text-lg opacity-40 font-normal">票</span></div>
                            <div class="text-xs opacity-30 font-mono">${percent}%</div>
                        </div>
                    </div>
                `;
            }).join('');

            root.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <div class="flex items-center gap-3">
                        <span class="bg-red-600 px-4 py-1 rounded-full text-xs font-black animate-pulse text-white">● LIVE</span>
                        <span class="opacity-50 text-sm font-bold ml-2">已投 ${totalVotes} 票</span>
                    </div>
                </div>

                <h1 class="text-5xl md:text-6xl font-black mb-16 leading-tight tracking-tight max-w-[1300px]">
                    🧠 ${target.question}
                </h1>

                <div class="grid grid-cols-12 gap-10 items-start">
                    <div class="col-span-12 lg:col-span-5">
                        <div class="neon-card p-10 flex items-end justify-around h-[500px]">
                            ${options.map(opt => {
                                const h = totalVotes > 0 ? (opt.voteCount / totalVotes * 90) : 5;
                                return `
                                    <div class="flex flex-col items-center gap-5 w-full h-full justify-end">
                                        <div class="text-xl font-black">${opt.voteCount || 0}</div>
                                        <div class="bar-gradient w-16 rounded-t-2xl transition-all duration-1000" style="height: ${h}%"></div>
                                        <div class="opacity-30 font-bold">${opt.text ? opt.text.substring(0,2) : ''}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="col-span-12 lg:col-span-7 space-y-8">
                        <div>${optionsHtml}</div>

                        <div class="transition-all duration-500 ${showAnswer ? 'opacity-100 scale-100' : 'opacity-0 scale-95 h-0 overflow-hidden'}">
                            <div class="p-8 rounded-3xl bg-yellow-400/10 border-2 border-yellow-400/30 text-yellow-100">
                                <div class="flex items-center gap-3 mb-5">
                                    <span class="text-2xl">💡</span>
                                    <h3 class="text-2xl font-black text-yellow-300">專家解答</h3>
                                </div>
                                <p class="text-lg leading-relaxed opacity-90">${target.expertAnalysis || "暫無專家解答數據。"}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-10 mt-16 items-center">
                    <div class="col-span-3 neon-card p-6 flex flex-col items-center gap-4 text-center">
                        <img src="https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=${encodeURIComponent(voteUrl)}" alt="QR Code" class="w-32 h-32 rounded-xl bg-white p-2">
                        <div class="text-sm font-bold text-green-400 animate-pulse">📲 掃碼投票</div>
                        <div class="text-xs opacity-30 font-mono break-all">${voteUrl}</div>
                    </div>
                    <div class="col-span-9 neon-card p-6 h-28 flex items-center">
                        <p class="text-lg text-slate-400 italic font-medium px-6">哇！超多人選這個 👀 真的嗎？</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
