<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const { useState, useEffect } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = Recharts;

        function App() {
            const [poll, setPoll] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                const pollsRef = ref(db, 'polls');
                const unsubscribe = onValue(pollsRef, (snapshot) => {
                    try {
                        const data = snapshot.val();
                        if (data) {
                            const activeKey = Object.keys(data).find(key => data[key].isActive === true);
                            const targetPoll = activeKey ? data[activeKey] : Object.values(data)[0];
                            
                            const options = targetPoll.options ? Object.entries(targetPoll.options).map(([id, opt]) => ({
                                name: opt.text || opt.label,
                                value: opt.voteCount || 0
                            })) : [];
                            
                            setPoll({ ...targetPoll, options });
                        }
                    } catch (e) {
                        setError(e.message);
                    }
                }, (err) => {
                    setError("資料庫連線失敗: " + err.message);
                });
                return () => unsubscribe();
            }, []);

            if (error) return <div class="text-red-500 p-10 text-xl font-bold">{error}</div>;
            if (!poll) return <div class="text-white p-10 text-2xl font-black animate-pulse">📡 正在從 Firebase 抓取資料...</div>;

            return (
                <div class="min-h-screen p-8 text-white font-sans">
                    <h1 class="text-5xl font-black mb-10 text-center">{poll.question}</h1>
                    <div class="max-w-4xl mx-auto bg-slate-900/50 p-8 rounded-[2rem] border border-white/10">
                        {poll.options.map((opt, i) => (
                            <div key={i} class="flex justify-between p-6 bg-white/5 rounded-2xl mb-4 text-2xl border border-white/5">
                                <div class="font-bold flex-1"><span class="opacity-30 mr-4">{i+1}.</span>{opt.name}</div>
                                <div class="text-blue-400 font-black">{opt.value} 票</div>
                            </div>
                        ))}
                    </div>
                    <p class="text-center mt-10 text-slate-500 font-bold">網址已連線至：voting-event-default-rtdb</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
