<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - STABLE VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 70%), #050508;
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; margin: 0; padding: 1rem 2rem;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 題目框細流光 */
        .question-box {
            position: relative; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem; min-height: 20vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .question-box::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 60%, transparent 100%);
            transform: skewX(-20deg); animation: fineScan 6s infinite ease-in-out;
        }
        @keyframes fineScan { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }

        .option-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2rem; padding: 0.8rem 2rem; height: 100%;
            display: flex; align-items: center; transition: all 0.5s ease;
        }
        .option-card.leading { border-color: #fbbf24; background: rgba(255, 255, 255, 0.1); }

        .shimmer-btn {
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777, #4f46e5);
            background-size: 200% auto; animation: shimmerMove 3s linear infinite;
        }
        @keyframes shimmerMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* 專家答案動畫 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999; background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(25px); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.6s ease;
        }
        .reveal-overlay.active { display: flex; opacity: 1; }
        .expert-text { font-style: italic; font-weight: 700; opacity: 0; transform: scale(0.8) skewX(-10deg); transition: all 0.8s ease; }
        .reveal-overlay.active .expert-text { opacity: 1; transform: scale(1) skewX(-10deg); }
    </style>
</head>
<body>

    <div id="root" class="h-full flex flex-col gap-4">
        <div class="h-full flex items-center justify-center">正在連線至 Firebase...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'bar', currentPollId: null };
        const colors = ['#818cf8', '#34d399', '#fbbf24', '#f472b6'];

        // 深度尋找專家分析文字
        function findAnalysis(poll) {
            const keys = ['expertAnalysis', 'analysis', 'expertMsg', 'description', 'expert'];
            for (let k of keys) if (poll[k]) return poll[k];
            return "分析準備中...";
        }

        function render(data) {
            const root = document.getElementById('root');
            // 處理 polls 節點
            const polls = data.polls || data;
            const activeEntry = Object.entries(polls).find(([id, p]) => p.isActive === true);

            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex items-center justify-center opacity-30 text-2xl">等待題目啟動中...</div>`;
                return;
            }

            const [id, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const msg = findAnalysis(poll);

            root.innerHTML = `
                <div class="flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-2 bg-red-600/20 px-4 py-1.5 rounded-full border border-red-600/30">
                        <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                        <span class="text-[10px] font-black tracking-widest uppercase text-red-500">Live Stage</span>
                    </div>
                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                        <button onclick="setUI('bar')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='bar'?'bg-white text-black':'opacity-40'}">BAR</button>
                        <button onclick="setUI('pie')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='pie'?'bg-white text-black':'opacity-40'}">PIE</button>
                        <button onclick="setUI('none')" class="px-5 py-1.5 rounded-lg text-[10px] font-black ${window.ui.chart==='none'?'bg-white text-black':'opacity-40'}">HIDE</button>
                    </div>
                    <div class="text-right">
                        <span class="text-4xl font-light tabular-nums text-yellow-400">${total}</span>
                    </div>
                </div>

                <div class="question-box p-8 shrink-0">
                    <h1 class="text-3xl font-medium text-center text-white/95">${poll.question}</h1>
                </div>

                <div class="flex-1 min-h-0 flex gap-6 overflow-hidden">
                    ${window.ui.chart !== 'none' ? `
                    <div class="flex-1 flex items-center justify-center bg-white/[0.01] rounded-[2.5rem] border border-white/5 p-10">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>` : ''}

                    <div class="${window.ui.chart !== 'none' ? 'w-5/12' : 'w-full'} flex flex-col gap-3">
                        ${options.map((o, i) => `
                            <div class="flex-1 min-h-0">
                                <div class="option-card ${o.voteCount === maxVotes && maxVotes > 0 ? 'leading' : ''}">
                                    <div class="text-4xl font-light mr-6 shrink-0" style="color:${colors[i%4]}">${String.fromCharCode(65+i)}</div>
                                    <div class="flex-1 text-2xl font-light">${o.text || o.label}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button onclick="toggleAnswer(true)" class="shimmer-btn w-full h-20 rounded-2xl text-2xl font-bold tracking-[0.6em]">
                    揭 曉 專 家 權 威 分 析
                </button>

                <div id="reveal-layer" class="reveal-overlay ${window.ui.showAnswer ? 'active' : ''}">
                    <div class="max-w-6xl text-center px-12">
                        <h2 class="expert-text text-4xl md:text-7xl leading-tight mb-28 text-white">「 ${msg} 」</h2>
                        <button onclick="toggleAnswer(false)" class="px-16 py-5 rounded-full bg-white text-black font-black text-xl">返回現場</button>
                    </div>
                </div>
            `;
        }

        function renderBar(opts, total) {
            return `<div class="flex items-end justify-around w-full h-full gap-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (o.voteCount / total * 100) : 5;
                    return `<div class="flex-1 flex flex-col items-center h-full justify-end">
                        <div class="w-full rounded-t-xl" style="height:${h}%; background:${colors[i%4]}"></div>
                        <span class="mt-2 text-xl font-bold" style="color:${colors[i%4]}">${o.voteCount}</span>
                    </div>`;
                }).join('')}
            </div>`;
        }

        function renderPie(opts, total) {
            if (total === 0) return "暫無數據";
            let acc = 0;
            const paths = opts.map((o, i) => {
                const val = o.voteCount / total;
                if (val === 0) return '';
                const x1 = Math.cos(2 * Math.PI * acc); const y1 = Math.sin(2 * Math.PI * acc);
                acc += val;
                const x2 = Math.cos(2 * Math.PI * acc); const y2 = Math.sin(2 * Math.PI * acc);
                const flag = val > 0.5 ? 1 : 0;
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${flag} 1 ${x2} ${y2} Z" fill="${colors[i%4]}"></path>`;
            }).join('');
            return `<svg viewBox="-1 -1 2 2" class="w-2/3 h-2/3 transform -rotate-90">${paths}</svg>`;
        }

        window.setUI = (c) => { window.ui.chart = c; }; // 這裡會透過 onValue 自動重繪
        window.toggleAnswer = (s) => {
            window.ui.showAnswer = s;
            const el = document.getElementById('reveal-layer');
            if (s) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 10); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 600); }
        };

        onValue(ref(db, '/'), (snap) => {
            const data = snap.val();
            if (data) render(data);
        });
    </script>
</body>
</html>
