<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Mastermind 專業問答展示端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        /* 繽紛顏色配色 */
        .color-A { border-left: 12px solid #4ade80; } 
        .color-B { border-left: 12px solid #3b82f6; } 
        .color-C { border-left: 12px solid #f97316; } 
        
        .bar-A { background: linear-gradient(to top, #065f46, #4ade80); box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); }
        .bar-B { background: linear-gradient(to top, #1e40af, #3b82f6); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .bar-C { background: linear-gradient(to top, #9a3412, #f97316); box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }

        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .vote-number { font-size: 4rem; font-weight: 900; line-height: 1; }

        .live-status {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 24px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="p-10">

    <div id="root" class="h-full flex flex-col w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { chartType: 'bar', showAnswer: false, hideCharts: false };
        let currentPollId = null;
        let lastDataSnapshot = null;

        const render = (data) => {
            const root = document.getElementById('root');
            const activeEntry = Object.entries(data || {}).find(([id, p]) => p.isActive);
            
            if (!activeEntry) {
                renderIdle(root);
                return;
            }

            const [pollId, poll] = activeEntry;

            // ⚡️ 自動重置：換下一題時自動跳回選項頁
            if (currentPollId !== pollId) {
                currentPollId = pollId;
                window.ui.showAnswer = false;
                window.ui.hideCharts = false; 
                window.speechSynthesis.cancel();
            }

            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const expertMsg = poll.expertAnalysis || poll.analysis || poll.answer || "解析準備中...";

            root.innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-6">
                        <div class="live-status">
                            <span class="flex h-3 w-3 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
                            </span>
                            <span class="text-white text-xs font-black tracking-widest">LIVE 連線中</span>
                        </div>
                        <div class="text-white/40 text-sm font-bold">
                            已投 <span class="text-white text-3xl font-black mx-1">${total}</span> 票
                        </div>
                    </div>
                    
                    <div class="flex gap-2 bg-black/30 p-2 rounded-2xl border border-white/10">
                        <button onclick="window.setChart('bar')" class="px-6 py-2 rounded-xl text-sm font-black transition ${window.ui.chartType==='bar' && !window.ui.hideCharts?'bg-blue-600 shadow-lg':'text-white/40'}">長條圖</button>
                        <button onclick="window.setChart('pie')" class="px-6 py-2 rounded-xl text-sm font-black transition ${window.ui.chartType==='pie' && !window.ui.hideCharts?'bg-blue-600 shadow-lg':'text-white/40'}">圓餅圖</button>
                        <button onclick="window.toggleHide()" class="px-6 py-2 rounded-xl text-sm font-black transition ${window.ui.hideCharts?'bg-red-600 shadow-lg':'text-white/40'}">${window.ui.hideCharts?'顯示圖表':'隱藏圖表'}</button>
                    </div>
                </div>

                <div class="mb-10 text-center">
                    <h1 class="text-6xl font-black leading-tight drop-shadow-2xl">Q: ${poll.question}</h1>
                </div>

                <div class="flex-1 grid ${window.ui.hideCharts ? 'grid-cols-1' : 'grid-cols-12'} gap-10 items-stretch overflow-hidden mb-8 transition-all duration-500">
                    
                    ${!window.ui.hideCharts ? `
                    <div class="col-span-6 bg-white/5 rounded-[3rem] p-12 flex flex-col items-center justify-center border border-white/10">
                        ${window.ui.chartType === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${window.ui.hideCharts ? 'max-w-4xl mx-auto w-full' : 'col-span-6'} flex flex-col gap-4">
                        ${options.map((o, i) => {
                            const char = String.fromCharCode(65+i);
                            return `
                                <div class="variety-card flex-1 px-10 py-6 flex justify-between items-center color-${char}">
                                    <div class="flex items-center gap-8">
                                        <div class="w-16 h-16 rounded-2xl bg-white text-slate-900 flex items-center justify-center text-4xl font-black shadow-xl">${char}</div>
                                        <div class="text-4xl font-bold">${o.text || o.label}</div>
                                    </div>
                                    <div class="${window.ui.hideCharts ? 'hidden' : 'block'} text-right">
                                        <div class="vote-number">${o.voteCount}</div>
                                        <div class="text-[10px] font-bold opacity-30 tracking-widest uppercase">Votes</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <button onclick="window.toggleAnswer(true)" class="w-full bg-gradient-to-r from-yellow-500 via-orange-500 to-red-600 py-6 rounded-[2rem] text-3xl font-black shadow-2xl hover:scale-[1.01] transition-all flex items-center justify-center gap-4">
                    💡 公佈專家解析
                </button>

                ${window.ui.showAnswer ? `
                    <div class="fixed inset-0 z-[9999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-16 animate-in fade-in duration-300">
                        <div class="max-w-6xl w-full text-center">
                            <div class="inline-block bg-yellow-400 text-black px-12 py-3 rounded-full text-xl font-black mb-12 shadow-2xl">專家深度解析 EXPERT ANALYSIS</div>
                            <p class="text-7xl font-black leading-tight mb-20 text-white drop-shadow-2xl">「 ${expertMsg} 」</p>
                            <div class="flex justify-center gap-10">
                                <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="bg-blue-600 px-20 py-8 rounded-full text-3xl font-black hover:bg-blue-500 shadow-2xl transition">🔊 播放語音</button>
                                <button onclick="window.toggleAnswer(false)" class="bg-white/10 px-20 py-8 rounded-full text-3xl font-black hover:bg-white/20 transition">返回</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-full max-h-[400px] gap-12">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    const char = String.fromCharCode(65+i);
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="text-4xl font-black mb-6 color-${char}">${o.voteCount}</div>
                            <div class="w-full bar-${char} rounded-t-3xl transition-all duration-1000" style="height: ${h}%"></div>
                            <div class="mt-8 font-black text-3xl opacity-20">${char}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const colors = ['#4ade80', '#3b82f6', '#f97316', '#ec4899'];
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                const x1 = Math.cos(2 * Math.PI * curr); const y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr); const y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${colors[i%4]}" stroke="#000" stroke-width="0.01"></path>`;
            }).join('');
            return `<div class="w-full h-full max-w-[450px] relative"><svg viewBox="-1.05 -1.05 2.1 2.1" class="transform -rotate-90 drop-shadow-[0_0_50px_rgba(0,0,0,0.5)]">${paths}</svg></div>`;
        };

        const renderIdle = (root) => {
            root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center"><div class="text-[120px] mb-12 animate-float">🧠</div><h1 class="text-8xl font-black tracking-tighter mb-8 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent">Mastermind</h1><div class="px-12 py-5 bg-white/5 rounded-full border border-white/10 animate-pulse text-2xl font-bold text-blue-400">等待主持人開啟題目...</div></div>`;
        };

        window.setChart = (t) => { window.ui.chartType = t; window.ui.hideCharts = false; render(lastDataSnapshot); };
        window.toggleHide = () => { window.ui.hideCharts = !window.ui.hideCharts; render(lastDataSnapshot); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(lastDataSnapshot); };
        window.speak = (msg) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(msg); u.lang='zh-TW'; window.speechSynthesis.speak(u); };

        onValue(ref(db, 'polls'), (snap) => {
            lastDataSnapshot = snap.val();
            render(lastDataSnapshot);
        });
    </script>
</body>
</html>
