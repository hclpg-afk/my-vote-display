<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>現場投票系統 - 權威舞台版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 60%), #020617;
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; margin: 0; padding: 1.5rem 2rem;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 標題動畫 */
        .question-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            min-height: 18vh;
            display: flex; align-items: center; justify-content: center;
            animation: slideDown 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 選項卡片氣勢動畫 */
        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 0 1.5rem;
            height: 100%;
            display: flex; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }
        .option-card.leading {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
            transform: scale(1.03);
        }

        /* 長條圖與圓餅圖容器動畫 */
        .chart-container {
            transition: all 0.6s ease;
            animation: zoomIn 0.8s ease;
        }

        /* 專家分析：斜體與流光 */
        .analysis-text {
            font-style: italic;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #a5b4fc, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(165, 180, 252, 0.4);
        }

        /* 氣勢動畫定義 */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes shimmerMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .shimmer-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(90deg, #4f46e5, #9333ea, #db2777);
            background-size: 200% auto;
            animation: shimmerMove 3s linear infinite;
        }

        .reveal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(2, 6, 23, 0.96);
            backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: all 0.6s ease;
        }
        .reveal-overlay.active { display: flex; opacity: 1; }
        .bar-anim { transition: height 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* 圓餅圖動畫 */
        .pie-slice { transition: all 1s ease; stroke-dasharray: 100 100; }
    </style>
</head>
<body>

    <div id="root" class="h-full flex flex-col gap-6"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI 狀態：增加模式切換
        window.ui = { showAnswer: false, lastActiveId: null, mode: 'bar' }; // bar, pie, hidden
        const colors = ['#818cf8', '#34d399', '#f97316', '#f472b6'];

        const findAnalysis = (poll) => {
            return poll.expertAnalysis || poll.analysis || "分析資料準備中...";
        };

        const render = () => {
            if (!window.rawData) return;
            const activeEntry = Object.entries(window.rawData).find(([id, p]) => p.isActive === true);
            
            if (!activeEntry) {
                document.getElementById('root').innerHTML = `<div class="h-full flex items-center justify-center opacity-20 text-4xl italic">WAITING FOR STAGE...</div>`;
                return;
            }

            const [id, poll] = activeEntry;
            if (window.ui.lastActiveId !== id) {
                window.ui.lastActiveId = id;
                window.ui.showAnswer = false;
            }

            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const analysis = findAnalysis(poll);

            document.getElementById('root').innerHTML = `
                <div class="flex justify-between items-center shrink-0">
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2 bg-red-600/20 px-4 py-1.5 rounded-full border border-red-600/30">
                            <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                            <span class="text-[10px] font-bold tracking-[0.2em] uppercase">Stage Live</span>
                        </div>
                        <div class="flex bg-white/5 rounded-full p-1 border border-white/10">
                            <button onclick="window.setMode('bar')" class="px-4 py-1 rounded-full text-xs transition ${window.ui.mode==='bar'?'bg-indigo-600':'opacity-50'}">長條圖</button>
                            <button onclick="window.setMode('pie')" class="px-4 py-1 rounded-full text-xs transition ${window.ui.mode==='pie'?'bg-indigo-600':'opacity-50'}">圓餅圖</button>
                            <button onclick="window.setMode('hidden')" class="px-4 py-1 rounded-full text-xs transition ${window.ui.mode==='hidden'?'bg-red-600':'opacity-50'}">隱藏數據</button>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xs opacity-40 mr-3 tracking-widest uppercase">Cumulative Votes</span>
                        <span class="text-5xl font-light tabular-nums text-yellow-400">${total}</span>
                    </div>
                </div>

                <div class="question-box px-16 py-6">
                    <h1 class="text-4xl md:text-5xl font-light text-center leading-snug text-white/90">Q: ${poll.question}</h1>
                </div>

                <div class="flex-1 min-h-0 flex gap-8">
                    
                    ${window.ui.mode !== 'hidden' ? `
                    <div class="flex-1 chart-container bg-white/[0.02] rounded-[2.5rem] border border-white/5 p-10 flex items-center justify-center">
                        ${window.ui.mode === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${window.ui.mode === 'hidden' ? 'w-full max-w-3xl mx-auto' : 'w-5/12'} flex flex-col gap-4">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="flex-1 min-h-0" style="animation-delay: ${i*0.1}s">
                                <div class="option-card ${isLeader && window.ui.mode !== 'hidden' ? 'leading' : ''}">
                                    <div class="text-4xl font-light mr-6 shrink-0" style="color:${colors[i%4]}">${String.fromCharCode(65+i)}</div>
                                    <div class="flex-1 text-2xl font-light truncate">${o.text || o.label}</div>
                                    ${(isLeader && window.ui.mode !== 'hidden') ? '<div class="text-2xl ml-2 animate-bounce">👑</div>' : ''}
                                </div>
                            </div>`
                        }).join('')}
                    </div>
                </div>

                <button onclick="window.toggleReveal(true)" class="shimmer-btn w-full h-20 rounded-2xl text-2xl font-bold shadow-[0_10px_40px_rgba(79,70,229,0.3)] tracking-[0.5em]">
                    揭 曉 專 家 權 威 分 析
                </button>

                <div id="reveal-layer" class="reveal-overlay ${window.ui.showAnswer ? 'active' : ''}">
                    <div class="reveal-content max-w-6xl text-center px-12">
                        <p class="text-indigo-400 text-sm tracking-[1em] mb-12 uppercase opacity-60 animate-pulse">Authority Analysis</p>
                        <h2 class="text-5xl md:text-7xl leading-tight mb-24 analysis-text">「 ${analysis} 」</h2>
                        <button onclick="window.toggleReveal(false)" class="px-20 py-6 rounded-full bg-white text-black font-black text-2xl hover:scale-110 active:scale-95 transition-all shadow-[0_0_50px_rgba(255,255,255,0.3)]">
                            返回計票現場
                        </button>
                    </div>
                </div>
            `;
        };

        // 長條圖組件
        const renderBar = (options, total) => `
            <div class="w-full h-full flex items-end justify-around gap-8">
                ${options.map((o, i) => {
                    const h = total > 0 ? (o.voteCount / total * 100) : 5;
                    return `
                    <div class="flex-1 flex flex-col items-center h-full justify-end">
                        <span class="mb-3 text-lg font-bold opacity-80 tabular-nums" style="color:${colors[i%4]}">${o.voteCount}</span>
                        <div class="w-full rounded-t-xl bar-anim shadow-lg shadow-${colors[i%4]}/20" style="height:${Math.max(h, 5)}%; background:${colors[i%4]}"></div>
                        <span class="mt-4 text-2xl font-light opacity-50">${String.fromCharCode(65+i)}</span>
                    </div>`
                }).join('')}
            </div>
        `;

        // 圓餅圖組件 (SVG)
        const renderPie = (options, total) => {
            let currentPercent = 0;
            const slices = options.map((o, i) => {
                const percent = total > 0 ? (o.voteCount / total) : 0.25;
                const startX = Math.cos(2 * Math.PI * currentPercent);
                const startY = Math.sin(2 * Math.PI * currentPercent);
                currentPercent += percent;
                const endX = Math.cos(2 * Math.PI * currentPercent);
                const endY = Math.sin(2 * Math.PI * currentPercent);
                const largeArc = percent > 0.5 ? 1 : 0;
                
                return `<path d="M 0 0 L ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} Z" fill="${colors[i%4]}" class="pie-slice" />`;
            }).join('');

            return `
                <div class="relative w-80 h-80">
                    <svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-full h-full">
                        ${slices}
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center flex-col bg-slate-900/40 rounded-full scale-50">
                        <span class="text-xs opacity-50">TOTAL</span>
                        <span class="text-4xl font-bold">${total}</span>
                    </div>
                </div>
            `;
        };

        window.setMode = (m) => { window.ui.mode = m; render(); };

        window.toggleReveal = (s) => {
            window.ui.showAnswer = s;
            const el = document.getElementById('reveal-layer');
            if (s) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 50); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 600); }
        };

        onValue(ref(db, 'polls'), (snap) => {
            window.rawData = snap.val();
            render();
        });
    </script>
</body>
</html>
