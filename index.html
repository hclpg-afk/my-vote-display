<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Master Reveal - 終極視覺系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;400;700;900&display=swap');
        body { 
            background: #02020a;
            background: radial-gradient(circle at center, #1a1a3a 0%, #02020a 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: white;
            overflow: hidden;
        }
        /* 舞台光影質感 */
        .stage-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .glow-gold { border: 1px solid rgba(251, 191, 36, 0.5); box-shadow: 0 0 80px rgba(251, 191, 36, 0.15); }
        
        /* 深度排版 */
        .stat-huge { font-weight: 900; font-size: 3.5rem; line-height: 1; letter-spacing: -2px; }
        .label-light { font-weight: 100; letter-spacing: 0.2em; opacity: 0.5; text-transform: uppercase; }

        /* 動態轉場：舞台煙霧感 */
        .stage-transition { transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .scene-hidden { opacity: 0; transform: translateY(50px) scale(0.9); pointer-events: none; position: absolute; width: 100%; }
        .scene-active { opacity: 1; transform: translateY(0) scale(1); position: relative; }
        
        /* 動態進場 */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .reveal-item { animation: slideIn 0.6s ease forwards; }
    </style>
</head>
<body class="p-12 md:p-20 h-screen flex flex-col">
    <div id="root" class="max-w-[1500px] mx-auto w-full h-full flex flex-col"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 核心狀態管理
        window.state = { showAnswer: false, chart: 'bar' };
        let pollData = null;

        const render = () => {
            if (!pollData) return;
            const root = document.getElementById('root');
            const target = Object.values(pollData).find(p => p.isActive) || Object.values(pollData)[0];
            const options = Object.values(target.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const expertText = target.expertAnalysis || target.analysis || "系統正在生成專家見解...";

            root.innerHTML = `
                <header class="mb-16 flex justify-between items-start">
                    <div class="max-w-4xl">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="bg-red-600 px-3 py-1 rounded text-[10px] font-black tracking-widest animate-pulse">LIVE REPORT</span>
                            <div class="h-[1px] w-20 bg-white/20"></div>
                            <span class="label-light text-xs">Session 2026 / Interactive Poll</span>
                        </div>
                        <h1 class="text-6xl font-bold leading-tight text-white/90">Q: ${target.question}</h1>
                    </div>
                    
                    <div class="flex bg-white/5 backdrop-blur-md p-1.5 rounded-2xl border border-white/10 ${window.state.showAnswer ? 'opacity-0' : ''} transition-opacity">
                        <button onclick="window.setUI('bar')" class="px-6 py-2 rounded-xl text-xs font-bold ${window.state.chart==='bar'?'bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.4)]':'opacity-40'}">BAR</button>
                        <button onclick="window.setUI('pie')" class="px-6 py-2 rounded-xl text-xs font-bold ${window.state.chart==='pie'?'bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.4)]':'opacity-40'}">PIE</button>
                    </div>
                </header>

                <main class="relative flex-grow">
                    <div class="stage-transition ${window.state.showAnswer ? 'scene-hidden' : 'scene-active'} grid grid-cols-12 gap-12 h-full">
                        <div class="col-span-7 stage-card p-12 flex items-center justify-center relative">
                            ${window.state.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                        </div>
                        <div class="col-span-5 flex flex-col gap-5">
                            ${options.map((o, i) => `
                                <div class="stage-card px-10 py-7 flex justify-between items-center group hover:bg-white/[0.05] transition-all">
                                    <div class="flex items-center gap-6">
                                        <div class="text-4xl font-black opacity-10 group-hover:opacity-100 group-hover:text-blue-500 transition-all">${String.fromCharCode(65+i)}</div>
                                        <div class="text-2xl font-medium text-white/80">${o.text || o.label}</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="stat-huge">${o.voteCount}</div>
                                        <div class="label-light text-[10px]">Votes</div>
                                    </div>
                                </div>
                            `).join('')}
                            <button onclick="window.toggleAnswer(true)" class="mt-auto bg-white text-black py-8 rounded-[2rem] text-2xl font-black hover:bg-blue-500 hover:text-white transition-all transform active:scale-95 shadow-2xl">
                                REVEAL ANALYSIS 💡
                            </button>
                        </div>
                    </div>

                    <div class="stage-transition ${window.state.showAnswer ? 'scene-active' : 'scene-hidden'} flex justify-center pt-10">
                        <div class="stage-card glow-gold p-16 max-w-5xl w-full relative">
                            <div class="flex justify-between items-center mb-12">
                                <div>
                                    <div class="label-light text-amber-500 mb-2">Expert Perspective</div>
                                    <h2 class="text-4xl font-bold">深度解析</h2>
                                </div>
                                <div class="flex gap-4">
                                    <button onclick="window.speak('${expertText.replace(/'/g, "\\'")}')" class="bg-amber-500 text-black px-8 py-3 rounded-full text-sm font-black hover:scale-105 transition-transform">🔊 朗讀解答</button>
                                    <button onclick="window.toggleAnswer(false)" class="bg-white/10 px-8 py-3 rounded-full text-sm font-bold hover:bg-white/20">返回統計</button>
                                </div>
                            </div>
                            <p class="text-4xl leading-relaxed font-light text-white/90 italic tracking-wide">
                                「 ${expertText} 」
                            </p>
                            <div class="mt-20 border-t border-white/5 pt-8 text-center">
                                <span class="label-light text-[10px]">Data Integrity Verified • Powered by Gemini Flash 3</span>
                            </div>
                        </div>
                    </div>
                </main>
            `;
        };

        const renderBar = (options, total) => `
            <div class="flex items-end justify-around w-full h-[400px] gap-10">
                ${options.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex flex-col items-center flex-1">
                            <div class="stat-huge text-4xl mb-6 text-blue-500">${o.voteCount}</div>
                            <div class="w-full bg-gradient-to-t from-blue-900 to-blue-400 rounded-t-2xl shadow-[0_0_40px_rgba(59,130,246,0.2)] transition-all duration-1000" style="height: ${h}%"></div>
                            <div class="label-light mt-6 text-sm">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (options, total) => {
            let curr = 0;
            const paths = options.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                const x1 = Math.cos(2 * Math.PI * curr); const y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr); const y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="rgba(59,130,246,${0.3 + (i*0.2)})" stroke="#1a1a3a" stroke-width="0.01"></path>`;
            }).join('');
            return `
                <div class="relative w-96 h-96">
                    <svg viewBox="-1.05 -1.05 2.1 2.1" class="transform -rotate-90 drop-shadow-[0_30px_50px_rgba(0,0,0,0.5)]">${paths}</svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="label-light text-xs mb-1">Total</div>
                        <div class="stat-huge text-6xl">${total}</div>
                    </div>
                </div>
            `;
        };

        // 語音控制
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'zh-TW'; u.rate = 0.95; u.pitch = 1.0;
            window.speechSynthesis.speak(u);
        };

        window.setUI = (c) => { window.state.chart = c; render(); };
        window.toggleAnswer = (s) => { 
            window.state.showAnswer = s; 
            if(!s) window.speechSynthesis.cancel();
            render(); 
        };

        onValue(ref(db, 'polls'), (snap) => {
            pollData = snap.val();
            render();
        });
    </script>
</body>
</html>
