<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統 - 最終質感修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            background: radial-gradient(circle at center, #1a154d 0%, #0c0a2a 100%);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }
        .neon-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        .answer-highlight { border: 2px solid #fbbf24; box-shadow: 0 0 40px rgba(251, 191, 36, 0.2); }
        .bar-grow { transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 動畫效果 */
        .page-transition { transition: all 0.5s ease-in-out; }
        .hidden-el { opacity: 0; pointer-events: none; transform: translateY(20px); position: absolute; }
        .visible-el { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="text-white min-h-screen p-6 md:p-12">
    <div id="root" class="max-w-[1400px] mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 全域 UI 狀態
        window.uiState = { 
            currentChart: 'bar', // 預設顯示長條圖，避免一進去空掉
            showAnswer: false 
        };
        let lastData = null;

        const render = () => {
            if (!lastData) return;
            const root = document.getElementById('root');
            const state = window.uiState;
            
            // 抓取當前活動題目
            const target = Object.values(lastData).find(p => p.isActive) || Object.values(lastData)[0];
            const options = Object.values(target.options || {});
            const totalVotes = options.reduce((sum, o) => sum + (Number(o.voteCount) || 0), 0);
            const expertText = target.expertAnalysis || target.analysis || "解析資料讀取中...";

            root.innerHTML = `
                <div class="flex justify-between items-center mb-12 page-transition ${state.showAnswer ? 'opacity-0' : ''}">
                    <div class="flex items-center gap-4">
                        <div class="bg-red-500/20 text-red-400 px-3 py-1 rounded-lg text-xs font-bold border border-red-500/30 animate-pulse">LIVE REPORT</div>
                        <div class="text-sm font-medium opacity-60">數據同步中 (${totalVotes} 票)</div>
                    </div>
                    <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                        <button onclick="window.setUI('bar')" class="px-4 py-2 rounded-lg text-sm font-medium transition ${state.currentChart==='bar'?'bg-blue-600 shadow-lg':'opacity-40'}">長條圖</button>
                        <button onclick="window.setUI('pie')" class="px-4 py-2 rounded-lg text-sm font-medium transition ${state.currentChart==='pie'?'bg-blue-600 shadow-lg':'opacity-40'}">圓餅圖</button>
                        <button onclick="window.setUI('none')" class="px-4 py-2 rounded-lg text-sm font-medium transition ${state.currentChart==='none'?'bg-blue-600 shadow-lg':'opacity-40'}">僅文字</button>
                    </div>
                </div>

                <div class="mb-12 transition-all duration-700 ${state.showAnswer ? 'text-center' : 'text-left'}">
                    <h1 class="text-4xl md:text-5xl font-bold leading-snug tracking-tight max-w-5xl ${state.showAnswer ? 'mx-auto' : ''}">
                        Q: ${target.question}
                    </h1>
                </div>

                <div class="relative min-h-[500px]">
                    
                    <div class="grid grid-cols-12 gap-8 transition-all duration-500 ${state.showAnswer ? 'opacity-0 scale-95 pointer-events-none' : 'visible-el'}">
                        
                        <div class="${state.currentChart === 'none' ? 'hidden' : 'col-span-12 lg:col-span-5'} neon-card p-10 flex flex-col items-center justify-center min-h-[450px]">
                            ${state.currentChart === 'bar' ? `
                                <div class="flex items-end justify-around w-full h-full gap-4 pt-10">
                                    ${options.map((o, i) => {
                                        const h = totalVotes > 0 ? (Number(o.voteCount) / totalVotes * 100) : 5;
                                        return `
                                            <div class="flex flex-col items-center w-full group">
                                                <div class="mb-4 text-xl font-bold text-blue-400">${o.voteCount}</div>
                                                <div class="w-full max-w-[60px] bg-blue-500/40 rounded-t-lg bar-grow relative overflow-hidden" style="height: ${h}%">
                                                    <div class="absolute inset-0 bg-gradient-to-t from-blue-600 to-cyan-400 opacity-80"></div>
                                                </div>
                                                <div class="mt-4 text-sm font-medium opacity-40">${String.fromCharCode(65+i)}</div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : `
                                <div class="relative w-64 h-64">
                                    <svg viewBox="-1 -1 2 2" class="transform -rotate-90">
                                        ${renderPie(options, totalVotes)}
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                                        <div class="text-xs opacity-40">TOTAL</div>
                                        <div class="text-4xl font-black">${totalVotes}</div>
                                    </div>
                                </div>
                            `}
                        </div>

                        <div class="${state.currentChart === 'none' ? 'col-span-12 max-w-4xl mx-auto' : 'col-span-12 lg:col-span-7'} space-y-4">
                            ${options.map((o, i) => `
                                <div class="neon-card p-6 flex justify-between items-center px-8 border-l-4 border-white/20">
                                    <div class="flex items-center gap-6">
                                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center font-bold text-sm">${String.fromCharCode(65+i)}</div>
                                        <div class="text-xl font-medium">${o.text || o.label}</div>
                                    </div>
                                    <div class="text-2xl font-bold">${o.voteCount} <span class="text-xs opacity-30 font-normal ml-1">票</span></div>
                                </div>
                            `).join('')}
                            
                            <button onclick="window.toggleAnswer(true)" class="w-full mt-8 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 py-6 rounded-2xl text-xl font-bold shadow-xl transition active:scale-95">
                                💡 公佈專家解答
                            </button>
                        </div>
                    </div>

                    <div class="absolute inset-0 transition-all duration-700 ${state.showAnswer ? 'visible-el' : 'opacity-0 scale-105 pointer-events-none'}">
                        <div class="neon-card answer-highlight p-12 max-w-5xl mx-auto min-h-[400px] flex flex-col justify-center bg-amber-500/5">
                            <div class="flex justify-between items-center mb-8 border-b border-amber-500/20 pb-6">
                                <div class="flex items-center gap-4">
                                    <div class="text-3xl text-amber-400">💡</div>
                                    <div class="text-2xl font-bold text-amber-400 tracking-wider">EXPERT ANALYSIS</div>
                                </div>
                                <div class="flex gap-3">
                                    <button class="bg-amber-500 text-black px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-400">🔊 朗讀</button>
                                    <button onclick="window.toggleAnswer(false)" class="bg-white/10 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/20">↩ 返回統計</button>
                                </div>
                            </div>
                            <p class="text-2xl leading-relaxed font-medium text-slate-100 italic">
                                「 ${expertText} 」
                            </p>
                        </div>
                    </div>

                </div>
            `;
        };

        const renderPie = (options, total) => {
            let current = 0;
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
            return options.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                const x1 = Math.cos(2 * Math.PI * current);
                const y1 = Math.sin(2 * Math.PI * current);
                current += p;
                const x2 = Math.cos(2 * Math.PI * current);
                const y2 = Math.sin(2 * Math.PI * current);
                const large = p > 0.5 ? 1 : 0;
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[i%4]}"></path>`;
            }).join('');
        };

        // 事件綁定
        window.setUI = (type) => { window.uiState.currentChart = type; render(); };
        window.toggleAnswer = (show) => { window.uiState.showAnswer = show; render(); };

        // 監聽 Firebase
        onValue(ref(db, 'polls'), (snap) => {
            lastData = snap.val();
            render();
        });
    </script>
</body>
</html>
