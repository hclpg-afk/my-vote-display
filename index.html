<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 皇冠加冕版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff; height: 100vh; overflow: hidden; margin: 0;
            display: flex; flex-direction: column;
        }

        /* 精緻流光邊框 (2px) */
        .header-box {
            position: relative; padding: 2px; border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.05); overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15);
        }
        .header-box::before {
            content: ''; position: absolute; width: 250%; height: 250%;
            background: conic-gradient(from 0deg, #4facfe, #00f2fe, #7000ff, #ff00c8, #4facfe);
            animation: rotate-fine 6s linear infinite; top: -75%; left: -75%; z-index: 0;
        }
        @keyframes rotate-fine { 100% { transform: rotate(360deg); } }

        .header-content {
            position: relative; z-index: 1;
            background: #0a0a20; padding: 1.2rem 2.5rem; border-radius: 1.3rem;
        }

        /* 皇冠浮動動畫 */
        @keyframes crown-float {
            0%, 100% { transform: translateY(0) scale(1.1); filter: drop-shadow(0 0 5px rgba(255,215,0,0.5)); }
            50% { transform: translateY(-5px) scale(1.3); filter: drop-shadow(0 0 15px rgba(255,215,0,0.8)); }
        }
        .crown-icon {
            display: inline-block;
            font-size: 1.8rem;
            animation: crown-float 1.5s ease-in-out infinite;
            cursor: default;
        }

        .vote-display {
            font-size: 4rem; font-weight: 700;
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px #442200);
            line-height: 1; font-variant-numeric: tabular-nums;
        }

        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 1.5rem 2.5rem; border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .variety-card.leading {
            border-color: rgba(255, 215, 0, 0.4);
            background: rgba(255, 215, 0, 0.05);
            transform: scale(1.02) translateX(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 解答遮罩層 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #1a0b3a 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .reveal-overlay.active { opacity: 1; pointer-events: auto; }
        .reveal-content {
            transform: scale(1.1); opacity: 0;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
        }
        .reveal-overlay.active .reveal-content { transform: scale(1); opacity: 1; }
    </style>
</head>
<body class="p-8">

    <div id="root" class="h-full flex flex-col max-w-[1600px] mx-auto w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'pie', currentPollId: null };
        const syncColors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];
        const syncLightColors = ['#60a5fa', '#67e8f9', '#c084fc', '#f472b6'];
        let rawData = null;
        let animatedVotes = {};

        const animateValue = (id, start, end, duration) => {
            if (start === end) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                animatedVotes[id] = Math.floor(progress * (end - start) + start);
                render();
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        };

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-white/20 text-4xl font-bold animate-pulse">等待主持人開題...</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const isHidden = window.ui.chart === 'none';
            const expertMsg = poll.expertAnalysis || poll.analysis || poll.expertAnswer || poll.answer || "載入中...";

            root.innerHTML = `
                <div class="w-full flex justify-between items-end mb-6 gap-6">
                    <div class="bg-red-600 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-3 shadow-lg shrink-0">
                        <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> LIVE
                    </div>
                    <div class="flex gap-4 items-center shrink-0">
                        <div class="flex bg-white/10 p-1 rounded-xl">
                            <button onclick="window.setUI('bar')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='bar'?'bg-cyan-500':'hover:bg-white/5'} transition">長條圖</button>
                            <button onclick="window.setUI('pie')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='pie'?'bg-cyan-500':'hover:bg-white/5'} transition">圓餅圖</button>
                            <button onclick="window.setUI('none')" class="px-4 py-2 rounded-lg text-sm font-bold ${window.ui.chart==='none'?'bg-red-500':'hover:bg-white/5'} transition">隱藏</button>
                        </div>
                        <div class="text-right ml-4">
                            <div class="text-xs font-bold opacity-50 uppercase">Total</div>
                            <div class="vote-display text-5xl">${total}</div>
                        </div>
                    </div>
                </div>

                <div class="header-box mb-8 shrink-0">
                    <div class="header-content text-center">
                        <h1 class="text-3xl font-bold tracking-tight text-white leading-normal">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-8 items-center mb-8 overflow-hidden min-h-0">
                    ${!isHidden ? `
                    <div class="col-span-6 bg-white/5 rounded-[2.5rem] flex items-center justify-center border border-white/10 p-10 h-full overflow-hidden">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${isHidden ? 'col-span-12 px-20' : 'col-span-6'} flex flex-col justify-around gap-6 h-full">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="variety-card w-full flex items-center justify-between ${isLeader ? 'leading' : ''}">
                                <div class="flex items-center gap-8">
                                    <div class="w-16 h-16 rounded-full flex items-center justify-center text-4xl font-black shadow-lg shrink-0" style="background-color: ${syncColors[i % 4]};">${String.fromCharCode(65+i)}</div>
                                    <div class="text-3xl font-bold text-white">${o.text || o.label}</div>
                                </div>
                                <div class="text-right shrink-0 ml-6">
                                    <div class="vote-display text-6xl">${animatedVotes[pollId + i] || o.voteCount}</div>
                                    <div class="mt-1 flex justify-end h-8 items-center">
                                        ${isLeader 
                                            ? `<span class="crown-icon">👑</span>` 
                                            : `<span class="text-xs font-bold opacity-30 uppercase tracking-widest">Votes</span>`
                                        }
                                    </div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>

                <button onclick="window.triggerReveal()" class="w-full flex-shrink-0 bg-gradient-to-r from-red-600 to-purple-600 py-6 rounded-[2.2rem] text-3xl font-black active:scale-[0.99] transition-all animate-pulse">
                    🔥 揭 曉 專 家 分 析
                </button>

                <div id="reveal-layer" class="reveal-overlay p-12">
                    <div class="max-w-6xl w-full text-center reveal-content">
                        <div class="inline-block bg-amber-400 text-black px-12 py-2 rounded-full text-sm font-black mb-12 shadow-2xl">EXPERT ANALYSIS</div>
                        <h2 class="text-5xl font-bold leading-[1.6] mb-24 italic text-white px-10">「 ${expertMsg} 」</h2>
                        <div class="flex justify-center gap-10">
                            <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="bg-cyan-500 text-white px-24 py-7 rounded-full text-3xl font-black shadow-xl">🔊 播放分析</button>
                            <button onclick="window.toggleAnswer(false)" class="bg-white/10 text-white px-24 py-7 rounded-full text-3xl font-black">返回題目</button>
                        </div>
                    </div>
                </div>
            `;
            if (window.ui.showAnswer) document.getElementById('reveal-layer').classList.add('active');
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-full max-h-[420px] gap-10 px-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="vote-display text-4xl mb-6">${o.voteCount}</div>
                            <div class="w-full rounded-t-3xl shadow-xl transition-all duration-1000" style="height: ${h}%; background: linear-gradient(to top, ${syncColors[i % 4]}, ${syncLightColors[i % 4]}, rgba(255,255,255,0.1));"></div>
                            <div class="mt-6 font-black text-2xl opacity-20">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                const x1 = Math.cos(2 * Math.PI * curr), y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr), y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}" stroke="#0a0a20" stroke-width="0.01"></path>`;
            }).join('');
            return `<div class="relative w-[400px] h-[400px] flex items-center justify-center"><svg viewBox="-1.02 -1.02 2.04 2.04" class="transform -rotate-90 w-full h-full drop-shadow-2xl">${paths}</svg><div class="absolute flex flex-col items-center bg-[#0a0a20]/80 p-6 rounded-full border border-white/10 backdrop-blur-md"><div class="text-6xl font-black">${total}</div></div></div>`;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.triggerReveal = () => { window.toggleAnswer(true); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            if (!data) return;
            const activeEntry = Object.entries(data).find(([id, p]) => p.isActive);
            const activeId = activeEntry ? activeEntry[0] : null;

            if (activeId !== window.ui.currentPollId) {
                window.ui.showAnswer = false; window.ui.currentPollId = activeId;
                animatedVotes = {};
            }

            if (activeEntry) {
                const options = Object.values(activeEntry[1].options || {});
                options.forEach((o, i) => {
                    const key = activeId + i;
                    const target = Number(o.voteCount);
                    if ((animatedVotes[key] || 0) < target) animateValue(key, animatedVotes[key] || 0, target, 800);
                    else animatedVotes[key] = target;
                });
            }
            rawData = data; render();
        });
    </script>
</body>
</html>
