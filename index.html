<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 穩定最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 加入 400, 500, 700 的字重，讓字體選擇更有層次，不再死板地全粗 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            padding: 4px;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.4);
        }
        .header-content {
            background: #0a0a20;
            padding: 1.5rem 3rem;
            border-radius: 1.3rem;
        }

        .vote-display {
            font-size: 4rem;
            font-weight: 700; /* 調降字重從 900 -> 700 */
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px #442200);
            line-height: 1;
        }

        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .variety-card:hover {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.1);
        }

        .reveal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            background-image: radial-gradient(circle, #2d1b69 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flashIn 0.5s ease-out;
        }
        @keyframes flashIn {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .pie-container {
            width: 100%;
            height: 100%;
            max-width: 350px;
            max-height: 350px;
        }
    </style>
</head>
