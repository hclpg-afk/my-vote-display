<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票展示系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
            <p style="font-size: 24px;">📡 正在啟動展示系統...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const { useState, useEffect } = React;

        function App() {
            const [poll, setPoll] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const db = getDatabase(app);
                    const pollsRef = ref(db, 'polls');

                    onValue(pollsRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            // 找出任何一個 isActive 的題目，沒有就抓最後一個
                            const pollsArray = Object.values(data);
                            const activePoll = pollsArray.find(p => p.isActive) || pollsArray[pollsArray.length - 1];
                            
                            const options = activePoll.options ? Object.values(activePoll.options).map(opt => ({
                                text: opt.text || opt.label,
                                count: opt.voteCount || 0
                            })) : [];

                            setPoll({ question: activePoll.question, options });
                        } else {
                            setError("資料庫目前沒有題目資料 (polls 為空)");
                        }
                    }, (err) => {
                        setError("Firebase 連線失敗: " + err.message);
                    });
                } catch (e) {
                    setError("程式執行錯誤: " + e.message);
                }
            }, []);

            if (error) return <div class="p-20 text-red-500 text-2xl font-bold">{error}</div>;
            if (!poll) return <div class="p-20 text-white text-2xl animate-pulse text-center">📡 已連線 Firebase，等待資料回傳...</div>;

            return React.createElement('div', { className: 'p-10 max-w-4xl mx-auto' }, 
                React.createElement('h1', { className: 'text-5xl font-black mb-12 text-blue-400 text-center' }, poll.question),
                React.createElement('div', { className: 'space-y-4' }, 
                    poll.options.map((opt, i) => 
                        React.createElement('div', { key: i, className: 'flex justify-between p-6 bg-white/10 rounded-3xl border border-white/10' },
                            React.createElement('span', { className: 'text-2xl font-bold' }, opt.text),
                            React.createElement('span', { className: 'text-3xl font-black text-green-400' }, `${opt.count} 票`)
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
