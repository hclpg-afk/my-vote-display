<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 精緻導播版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body { 
            background: #050508; 
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; height: 100vh; overflow: hidden; margin: 0;
            display: flex; flex-direction: column;
        }

        /* 1. 極細流光 (調暗背景，降低霓虹感) */
        .header-box {
            position: relative; padding: 1px; border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05); overflow: hidden;
        }
        .header-box::before {
            content: ''; position: absolute; width: 150%; height: 150%;
            background: conic-gradient(from 0deg, rgba(79, 70, 229, 0.5), rgba(14, 165, 233, 0.5), rgba(79, 70, 229, 0.5));
            animation: rotate-fine 10s linear infinite; top: -25%; left: -25%; z-index: 0;
        }
        @keyframes rotate-fine { 100% { transform: rotate(360deg); } }

        .header-content {
            position: relative; z-index: 1;
            background: #0d0d15; padding: 1rem 2rem; border-radius: 0.95rem;
        }

        /* 2. 字體粗細微調：標題適中，選項調細且放大 */
        h1 { font-weight: 400; letter-spacing: 0.02em; }
        .option-text { font-weight: 300; font-size: 1.35rem; color: #f3f4f6; } /* 放大且變細 */

        /* 3. 優雅皇冠 */
        .crown-svg {
            width: 28px; height: 28px; fill: #fbbf24;
            filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.3));
            animation: crown-float 2s ease-in-out infinite;
        }
        @keyframes crown-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .vote-number {
            font-family: 'Inter', sans-serif;
            font-weight: 300; font-size: 3rem; /* 數字微調大小以適應空間 */
            color: #ffffff; letter-spacing: -0.02em;
        }

        /* 4. 選項卡片質感 (減少上下 Padding，避免選項被擠壓) */
        .variety-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.75rem 1.5rem; /* 壓縮高度，為C/D選項騰出空間 */
            border-radius: 0.75rem;
            transition: all 0.5s ease;
        }
        .variety-card.leading {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(251, 191, 36, 0.4);
            transform: translateX(5px);
        }

        /* 解答層 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(5, 5, 8, 0.95); display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .reveal-overlay.active { opacity: 1; pointer-events: auto; }
        .reveal-content { transform: translateY(20px); opacity: 0; transition: all 0.8s ease 0.2s; }
        .reveal-overlay.active .reveal-content { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="p-8"> <div id="root" class="h-full flex flex-col max-w-[1400px] mx-auto w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'pie', currentPollId: null };
        // 降低色彩飽和度，改用更柔和的莫蘭迪色系消除霓虹感
        const syncColors = ['#818cf8', '#38bdf8', '#a78bfa', '#f472b6']; 
        let rawData = null;
        let animatedVotes = {};

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            if (!activeEntry) {
                root.innerHTML = `<div class="h-full flex items-center justify-center opacity-20 text-2xl font-light tracking-widest">AWAITING SESSION...</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            const isHidden = window.ui.chart === 'none';
            const expertMsg = poll.expertAnalysis || poll.analysis || "系統分析中...";

            root.innerHTML = `
                <div class="w-full flex justify-between items-center mb-6"> <div class="flex items-center gap-4">
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-ping"></div>
                        <span class="text-xs font-medium tracking-[0.2em] opacity-50 uppercase">Live Broadcast</span>
                    </div>
                    <div class="flex gap-8 items-center">
                        <div class="flex bg-white/5 p-1 rounded-lg border border-white/5">
                            <button onclick="window.setUI('bar')" class="px-3 py-1.5 rounded text-[10px] font-bold ${window.ui.chart==='bar'?'bg-white/10':'opacity-30'} transition">BAR</button>
                            <button onclick="window.setUI('pie')" class="px-3 py-1.5 rounded text-[10px] font-bold ${window.ui.chart==='pie'?'bg-white/10':'opacity-30'} transition">PIE</button>
                            <button onclick="window.setUI('none')" class="px-3 py-1.5 rounded text-[10px] font-bold ${window.ui.chart==='none'?'bg-white/10':'opacity-30'} transition">OFF</button>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] font-bold opacity-30 uppercase tracking-widest">Total Audience</div>
                            <div class="text-3xl font-light">${total}</div>
                        </div>
                    </div>
                </div>

                <div class="header-box mb-6"> <div class="header-content text-center">
                        <h1 class="text-2xl text-white/90">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-10 items-center mb-6 min-h-0"> ${!isHidden ? `
                    <div class="col-span-5 h-full flex items-center justify-center bg-white/[0.02] rounded-3xl border border-white/5 py-4">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${isHidden ? 'col-span-8 col-start-3' : 'col-span-7'} flex flex-col justify-center gap-3">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            const letter = String.fromCharCode(65 + i); // 自動轉成 A, B, C, D
                            return `
                            <div class="variety-card w-full flex items-center justify-between ${isLeader ? 'leading' : ''}">
                                <div class="flex items-center gap-5">
                                    <div class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center text-lg font-normal bg-white/5 text-white/80">${letter}</div>
                                    <div class="option-text">${o.text || o.label}</div>
                                </div>
                                <div class="text-right flex items-center gap-6">
                                    <div class="vote-number">${animatedVotes[pollId + i] || o.voteCount}</div>
                                    <div class="w-8 flex justify-center">
                                        ${isLeader ? `
                                            <svg class="crown-svg" viewBox="0 0 24 24">
                                                <path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.6 18.6 20 18 20H6C5.4 20 5 19.6 5 19V18H19V19Z" />
                                            </svg>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>

                <button onclick="window.triggerReveal()" class="w-full py-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-white/60 text-sm font-light tracking-[0.4em] transition-all active:scale-[0.99]">
                    REVEAL ANALYSIS
                </button>

                <div id="reveal-layer" class="reveal-overlay">
                    <div class="max-w-4xl w-full text-center reveal-content">
                        <div class="text-xs tracking-[0.5em] opacity-30 mb-8 uppercase">Expert Opinion</div>
                        <h2 class="text-4xl font-light leading-relaxed text-white/90 px-10">「 ${expertMsg} 」</h2>
                        <div class="mt-20 flex justify-center gap-6">
                            <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="px-12 py-4 rounded-full border border-white/20 hover:bg-white/10 transition text-sm tracking-widest">AUDIO PLAYBACK</button>
                            <button onclick="window.toggleAnswer(false)" class="px-12 py-4 rounded-full bg-white text-black text-sm tracking-widest font-bold">CLOSE</button>
                        </div>
                    </div>
                </div>
            `;
            if (window.ui.showAnswer) document.getElementById('reveal-layer').classList.add('active');
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-[280px] gap-8 px-12">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 2;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="w-full rounded-sm transition-all duration-1000" style="height: ${h}%; background: ${syncColors[i%4]}; opacity: 0.85;"></div>
                            <div class="mt-4 text-[10px] opacity-30 font-bold tracking-tighter">${String.fromCharCode(65 + i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                const x1 = Math.cos(2 * Math.PI * curr), y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr), y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}" opacity="0.85"></path>`;
            }).join('');
            return `<div class="relative w-[280px] h-[280px]"><svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-full h-full">${paths}</svg></div>`;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.triggerReveal = () => { window.toggleAnswer(true); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 1;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            if (!data) return;
            const activeEntry = Object.entries(data).find(([id, p]) => p.isActive);
            const activeId = activeEntry ? activeEntry[0] : null;

            if (activeId !== window.ui.currentPollId) {
                window.ui.showAnswer = false; window.ui.currentPollId = activeId;
                animatedVotes = {};
            }

            if (activeEntry) {
                const options = Object.values(activeEntry[1].options || {});
                options.forEach((o, i) => {
                    const key = activeId + i;
                    const target = Number(o.voteCount);
                    animatedVotes[key] = target; 
                });
            }
            rawData = data; render();
        });
    </script>
</body>
</html>
