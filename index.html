<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - 豪華熱鬧版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Inter:wght@800&display=swap');
        
        body { 
            background: radial-gradient(circle at top, #1a0b3b 0%, #050508 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff; 
            /* 修正關鍵：不再鎖死高度，允許捲動 */
            min-height: 100vh; 
            margin: 0; 
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        /* 綜藝感標題：霓虹流光 */
        .header-box {
            position: relative; padding: 4px; border-radius: 1.5rem;
            background: linear-gradient(90deg, #ff0080, #7928ca, #4299e1);
            background-size: 200% auto;
            animation: flow 3s linear infinite;
            box-shadow: 0 10px 40px rgba(121, 40, 202, 0.4);
        }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        .header-content {
            background: #0d0d15; padding: 2rem; border-radius: 1.3rem;
        }

        /* 選項卡片：熱鬧大氣 */
        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem 2.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 領先者效果 */
        .variety-card.leading {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            transform: scale(1.02) translateX(10px);
            box-shadow: -10px 0 30px rgba(251, 191, 36, 0.2);
        }

        .vote-number {
            font-family: 'Inter', sans-serif; font-weight: 800; font-size: 4.5rem;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 揭曉按鈕：大面積漸層 */
        .reveal-btn {
            background: linear-gradient(90deg, #f43f5e, #8b5cf6);
            box-shadow: 0 10px 40px rgba(244, 63, 94, 0.4);
            font-weight: 900; letter-spacing: 0.3em;
            transition: all 0.3s ease;
        }
        .reveal-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* 解答層 */
        .reveal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(5, 5, 8, 0.98);
            display: none; align-items: center; justify-content: center;
        }
        .reveal-overlay.active { display: flex; animation: zoomIn 0.5s ease forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="root" class="max-w-[1500px] mx-auto w-full flex flex-col gap-10"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.ui = { showAnswer: false, chart: 'bar', currentPollId: null };
        const syncColors = ['#6366f1', '#10B981', '#f59e0b', '#ec4899'];
        let rawData = null;

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            if (!activeEntry) {
                root.innerHTML = `<div class="py-40 text-center opacity-20 text-4xl font-black italic tracking-tighter">WAITING FOR NEXT ROUND...</div>`;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const maxVotes = Math.max(...options.map(o => o.voteCount));
            // 修正：抓取解答資料
            const expertMsg = poll.expertAnalysis || poll.analysis || poll.expert || "解答資料讀取中...";

            root.innerHTML = `
                <div class="flex justify-between items-end">
                    <div class="flex items-center gap-4 bg-red-600 px-6 py-2 rounded-full animate-pulse">
                        <div class="w-3 h-3 bg-white rounded-full"></div>
                        <span class="text-sm font-black italic tracking-widest uppercase">Live On Stage</span>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-bold opacity-40 mb-1 tracking-widest uppercase">Total Votes</div>
                        <div class="text-6xl font-black">${total}</div>
                    </div>
                </div>

                <div class="header-box">
                    <div class="header-content text-center">
                        <h1 class="text-3xl md:text-5xl font-black leading-tight">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-10 items-start">
                    <div class="col-span-12 lg:col-span-5 bg-white/5 rounded-[2.5rem] p-10 border border-white/10">
                        <div class="flex gap-4 mb-8 justify-center">
                             <button onclick="window.setUI('bar')" class="px-6 py-2 rounded-full border border-white/20 text-xs font-bold ${window.ui.chart==='bar'?'bg-white text-black':''}">BAR</button>
                             <button onclick="window.setUI('pie')" class="px-6 py-2 rounded-full border border-white/20 text-xs font-bold ${window.ui.chart==='pie'?'bg-white text-black':''}">PIE</button>
                        </div>
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>

                    <div class="col-span-12 lg:col-span-7 flex flex-col gap-6">
                        ${options.map((o, i) => {
                            const isLeader = o.voteCount === maxVotes && maxVotes > 0;
                            return `
                            <div class="variety-card ${isLeader ? 'leading' : ''}">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-8">
                                        <div class="w-16 h-16 rounded-2xl bg-white/10 flex items-center justify-center text-4xl font-black" style="color: ${syncColors[i%4]}">${String.fromCharCode(65+i)}</div>
                                        <div class="text-2xl font-bold">${o.text || o.label}</div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="vote-number">${o.voteCount}</div>
                                        ${isLeader ? '👑' : ''}
                                    </div>
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                </div>

                <button onclick="window.triggerReveal()" class="reveal-btn w-full py-8 rounded-[2rem] text-3xl my-10">
                    🔥 揭 曉 專 家 權 威 分 析 🔥
                </button>

                <div id="reveal-layer" class="reveal-overlay">
                    <div class="max-w-5xl w-full text-center p-10">
                        <div class="text-yellow-400 text-sm font-black tracking-[0.8em] mb-12 uppercase">Special Analysis</div>
                        <h2 class="text-5xl font-black leading-tight mb-20">「 ${expertMsg} 」</h2>
                        <div class="flex justify-center gap-8">
                            <button onclick="window.speak('${expertMsg.replace(/'/g, "\\'")}')" class="px-12 py-5 rounded-full border-2 border-white/20 hover:bg-white/10 text-xl font-bold">播放語音</button>
                            <button onclick="window.toggleAnswer(false)" class="px-12 py-5 rounded-full bg-white text-black text-xl font-black">返回現場</button>
                        </div>
                    </div>
                </div>
            `;
            if (window.ui.showAnswer) document.getElementById('reveal-layer').classList.add('active');
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-between h-[350px] gap-6">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center group h-full justify-end">
                            <div class="w-full rounded-t-2xl transition-all duration-1000 relative shadow-2xl" style="height: ${h}%; background: ${syncColors[i%4]}">
                                <div class="absolute -top-12 left-1/2 -translate-x-1/2 text-2xl font-black">${o.voteCount}</div>
                            </div>
                            <div class="mt-6 text-lg font-black opacity-40">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0;
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                const x1 = Math.cos(2 * Math.PI * curr), y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr), y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${syncColors[i%4]}"></path>`;
            }).join('');
            return `<div class="relative w-full aspect-square max-w-[350px] mx-auto"><svg viewBox="-1 -1 2 2" class="transform -rotate-90 w-full h-full">${paths}</svg></div>`;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.triggerReveal = () => { window.toggleAnswer(true); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg); u.lang = 'zh-TW'; u.rate = 1;
            window.speechSynthesis.speak(u);
        };

        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            if (!data) return;
            rawData = data;
            const activeEntry = Object.entries(data).find(([id, p]) => p.isActive);
            if (activeEntry && activeEntry[0] !== window.ui.currentPollId) {
                window.ui.showAnswer = false;
                window.ui.currentPollId = activeEntry[0];
            }
            render();
        });
    </script>
</body>
</html>
