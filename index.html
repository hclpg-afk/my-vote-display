這是一個非常重要的流程優化！在綜藝投屏中，當主控切換到下一題時，畫面必須自動重置，不能讓上一題的答案擋住新題目。

我已經在程式碼中加入了 **「題目 ID 追蹤」** 邏輯：
1. **自動重置**：系統會記憶當前的題目 ID。一旦偵測到資料庫切換了題目（ID 變更），會自動將 `showAnswer` 設為 `false`，讓畫面跳回題目頁。
2. **視覺優化**：保留了你要求的字體粗細調整、圖表隱藏延伸、以及防止選項被壓縮的佈局。

以下是更新後的完整程式碼：

```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>THE ULTIMATE SHOW - Pro 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1a1b4b 0%, #050505 100%);
            font-family: 'Noto Sans TC', sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            padding: 4px;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.4);
        }
        .header-content {
            background: #0a0a20;
            padding: 1.5rem 3rem;
            border-radius: 1.3rem;
        }

        .vote-display {
            font-size: 4rem;
            font-weight: 700; /* 字體不宜太粗，改用 700 */
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px #442200);
            line-height: 1;
        }

        .variety-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            min-height: 100px; /* 確保選項不會被壓縮 */
        }

        .reveal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            background-image: radial-gradient(circle, #2d1b69 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: flashIn 0.5s ease-out;
        }

        @keyframes flashIn {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .waiting-spin {
            animation: slow-spin 10s linear infinite;
        }
        @keyframes slow-spin {
            0%, 40% { transform: rotate(0deg); }
            50%, 90% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-8">

    <div id="root" class="h-full flex flex-col max-w-[1600px] mx-auto w-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI 狀態管理
        window.ui = { 
            showAnswer: false, 
            chart: 'bar',
            currentPollId: null // 用來追蹤目前是哪一題
        };
        
        let rawData = null;

        const render = () => {
            if (!rawData) return;
            const root = document.getElementById('root');
            
            // 找出當前 isActive 的投票 ID 與內容
            const activeEntry = Object.entries(rawData).find(([id, p]) => p.isActive);
            
            // --- 如果沒有題目開啟中：顯示沙漏等待畫面 ---
            if (!activeEntry) {
                root.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center">
                        <div class="mb-10 waiting-spin">
                            <img src="https://cdn-icons-png.flaticon.com/512/3003/3003168.png" width="140" style="filter: invert(1) drop-shadow(0 0 20px #4facfe);">
                        </div>
                        <h1 class="text-6xl font-bold mb-6 tracking-widest text-white">等待主持人開題中</h1>
                        <p class="text-2xl opacity-50 mb-16">題目開始後即可掃碼投票</p>
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-[0_0_50px_rgba(255,255,255,0.2)] mb-10">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://voting-event.web.app/vote" width="280">
                        </div>
                        <div class="flex items-center gap-3 text-2xl font-bold text-green-400">
                            <span class="text-3xl">📱</span> 掃碼準備投票
                        </div>
                        <p class="mt-4 text-white/30 font-mono tracking-tighter">https://voting-event.web.app/vote</p>
                    </div>
                `;
                return;
            }

            const [pollId, poll] = activeEntry;
            const options = Object.values(poll.options || {});
            const total = options.reduce((s, o) => s + (Number(o.voteCount) || 0), 0);
            const isHidden = window.ui.chart === 'none';

            root.innerHTML = `
                <div class="w-full flex justify-between items-center mb-4">
                    <div class="bg-red-600 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-3">
                        <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div> LIVE 連線中
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-xl font-bold opacity-60">總票數</div>
                        <div class="vote-display text-5xl">${total}</div>
                    </div>
                </div>

                <div class="header-box mb-6">
                    <div class="header-content text-center">
                        <h1 class="text-4xl font-bold leading-tight">Q: ${poll.question}</h1>
                    </div>
                </div>

                <div class="w-full flex justify-end gap-2 mb-4">
                    <button onclick="window.setUI('bar')" class="px-4 py-2 rounded-lg text-xs font-bold ${window.ui.chart==='bar'?'bg-cyan-500':'bg-white/10'}">長條圖</button>
                    <button onclick="window.setUI('pie')" class="px-4 py-2 rounded-lg text-xs font-bold ${window.ui.chart==='pie'?'bg-cyan-500':'bg-white/10'}">圓餅圖</button>
                    <button onclick="window.setUI('none')" class="px-4 py-2 rounded-lg text-xs font-bold ${window.ui.chart==='none'?'bg-red-500 text-white':'bg-white/10'}">隱藏圖表</button>
                </div>

                <div class="flex-1 grid grid-cols-12 gap-8 items-stretch mb-6 overflow-hidden">
                    ${!isHidden ? `
                    <div class="col-span-6 bg-white/5 rounded-[2.5rem] p-8 flex items-center justify-center border border-white/10">
                        ${window.ui.chart === 'bar' ? renderBar(options, total) : renderPie(options, total)}
                    </div>
                    ` : ''}

                    <div class="${isHidden ? 'col-span-12' : 'col-span-6'} flex flex-col gap-4 justify-center">
                        ${options.map((o, i) => `
                            <div class="variety-card w-full rounded-[1.8rem] px-8 py-6 flex justify-between items-center">
                                <div class="flex items-center gap-6">
                                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-2xl font-black">${String.fromCharCode(65+i)}</div>
                                    <div class="text-2xl font-bold">${o.text || o.label}</div>
                                </div>
                                <div class="text-right">
                                    <div class="vote-display text-4xl">${o.voteCount}</div>
                                    <div class="text-xs font-bold opacity-40 mt-1">VOTES</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button onclick="window.toggleAnswer(true)" class="w-full bg-gradient-to-r from-red-600 via-pink-600 to-purple-600 py-6 rounded-[2.2rem] text-2xl font-bold shadow-2xl hover:brightness-110 active:scale-[0.98] transition-all animate-pulse">
                    🔥 揭曉專家分析
                </button>

                ${window.ui.showAnswer ? `
                    <div class="reveal-overlay p-12">
                        <div class="max-w-6xl w-full text-center">
                            <div class="inline-block bg-amber-400 text-black px-10 py-2 rounded-full text-sm font-black mb-10 shadow-lg">專家分析</div>
                            <h2 class="text-5xl font-bold leading-[1.4] mb-20 italic text-white drop-shadow-2xl">
                                「 ${poll.expertAnalysis || poll.analysis || '載入中...'} 」
                            </h2>
                            <div class="flex justify-center gap-8">
                                <button onclick="window.speak('${(poll.expertAnalysis || poll.analysis || "").replace(/'/g, "\\'")}')" class="bg-cyan-500 hover:bg-cyan-400 text-white px-20 py-6 rounded-full text-2xl font-bold transition-all shadow-xl active:scale-95">🔊 語音播放</button>
                                <button onclick="window.toggleAnswer(false)" class="bg-white/10 hover:bg-white/20 text-white px-20 py-6 rounded-full text-2xl font-bold transition-all">返回</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        };

        const renderBar = (opts, total) => `
            <div class="flex items-end justify-around w-full h-[350px] gap-8 px-4">
                ${opts.map((o, i) => {
                    const h = total > 0 ? (Number(o.voteCount) / total * 100) : 5;
                    return `
                        <div class="flex-1 flex flex-col items-center h-full justify-end">
                            <div class="vote-display text-3xl mb-4">${o.voteCount}</div>
                            <div class="w-full bg-gradient-to-t from-blue-600 via-cyan-400 to-white/20 rounded-t-2xl shadow-lg" style="height: ${h}%"></div>
                            <div class="mt-6 font-bold text-xl opacity-30">${String.fromCharCode(65+i)}</div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;

        const renderPie = (opts, total) => {
            let curr = 0; const colors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];
            const paths = opts.map((o, i) => {
                const p = total > 0 ? (Number(o.voteCount) / total) : 0;
                if (p === 0) return '';
                if (p === 1) return `<circle cx="0" cy="0" r="1" fill="${colors[i%4]}"></circle>`;
                const x1 = Math.cos(2 * Math.PI * curr); const y1 = Math.sin(2 * Math.PI * curr);
                curr += p;
                const x2 = Math.cos(2 * Math.PI * curr); const y2 = Math.sin(2 * Math.PI * curr);
                return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${p > 0.5 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${colors[i%4]}"></path>`;
            }).join('');
            return `
                <div class="relative w-[380px] h-[380px] flex items-center justify-center">
                    <svg viewBox="-1.02 -1.02 2.04 2.04" class="transform -rotate-90 w-full h-full drop-shadow-2xl">${paths}</svg>
                    <div class="absolute flex flex-col items-center">
                        <div class="text-xs font-bold opacity-50 mb-1">TOTAL</div>
                        <div class="text-5xl font-bold">${total}</div>
                    </div>
                </div>
            `;
        };

        window.setUI = (c) => { window.ui.chart = c; render(); };
        window.toggleAnswer = (s) => { window.ui.showAnswer = s; render(); };
        window.speak = (msg) => {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'zh-TW'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        };

        // 核心邏輯：偵測題目變動
        onValue(ref(db, 'polls'), (snap) => {
            const data = snap.val();
            const activeEntry = Object.entries(data || {}).find(([id, p]) => p.isActive);
            const activeId = activeEntry ? activeEntry[0] : null;

            // 重要：如果題目 ID 變了，代表主持人按了下一題，自動關閉答案遮罩
            if (activeId !== window.ui.currentPollId) {
                window.ui.showAnswer = false; 
                window.ui.currentPollId = activeId;
            }

            rawData = data;
            render();
        });
    </script>
</body>
</html>
