<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>即時投票系統 - 製作人穩如泰山版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border-radius: 1.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        /* 綜藝感進場動畫 */
        .animate-slide-down { animation: slideDown 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; transform-origin: top; }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px) scaleY(0.9); max-height: 0; margin-top: 0; }
            100% { opacity: 1; transform: translateY(0) scaleY(1); max-height: 800px; margin-top: 2rem; }
        }

        .animate-bar { animation: barGrow 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; transform-origin: bottom; }
        @keyframes barGrow {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .animate-pie { animation: pieSpin 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pieSpin {
            0% { transform: scale(0.8) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(-90deg); opacity: 1; }
        }

        /* 選項專屬顏色 */
        .opt-0 { border-color: #22c55e; } .opt-bg-0 { background: #22c55e; } 
        .opt-1 { border-color: #3b82f6; } .opt-bg-1 { background: #3b82f6; } 
        .opt-2 { border-color: #f97316; } .opt-bg-2 { background: #f97316; } 
        .opt-3 { border-color: #ec4899; } .opt-bg-3 { background: #ec4899; } 
    </style>
</head>
<body class="text-white min-h-screen p-8 lg:p-12">
    <div id="root" class="max-w-[1400px] mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt_319BG9mDYgbeZJhCWz52iMfdnaTbTE",
            authDomain: "voting-event.firebaseapp.com",
            databaseURL: "https://voting-event-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voting-event",
            storageBucket: "voting-event.firebasestorage.app",
            messagingSenderId: "680113677727",
            appId: "1:680113677727:web:8dc23a48f35b0bcb0b09aa"
        };

        initializeApp(firebaseConfig);
        const db = getDatabase();

        // 預設為隱藏圖表模式，版面最乾淨
        window.uiState = { currentChart: 'none', answerVisible: false };
        let lastRawData = null;

        const renderView = () => {
            if (!lastRawData) return;
            
            const target = Object.values(lastRawData).find(p => p && p.isActive) || Object.values(lastRawData)[0];
            if (!target) return;

            // 🛡️ 防禦機制：過濾掉導致畫面黑掉的 null 幽靈資料
            const rawOptions = target.options || {};
            const options = (Array.isArray(rawOptions) ? rawOptions : Object.values(rawOptions))
                .filter(opt => opt && typeof opt === 'object');
            
            const totalVotes = options.reduce((sum, opt) => sum + (Number(opt.voteCount) || 0), 0);

            // 🧠 智慧型解答抓取
            let expertMsg = target.expertAnalysis || target.analysis || target.explanation || target.expertAnswer || target.answer || target.expert_analysis;
            
            if (!expertMsg) {
                // 自動尋找疑似解答的長字串
                const stringFields = Object.entries(target).filter(([k, v]) => typeof v === 'string' && k !== 'question' && k !== 'id' && v.length > 20);
                if (stringFields.length > 0) {
                    expertMsg = stringFields[0][1]; 
                } else {
                    // 真的找不到，啟動偵錯模式
                    const keys = Object.keys(target).join(', ');
                    expertMsg = `<span class="text-red-400">系統找不到解答文字！<br>目前資料庫有的欄位為：[ ${keys} ]<br>請確認解答是否打在這些欄位中。</span>`;
                }
            }

            const state = window.uiState;
            const rootElement = document.getElementById('root');

            let pieSlices = '';
            if (totalVotes === 0) {
                pieSlices = `<circle r="1" cx="0" cy="0" fill="#ffffff" opacity="0.05" />`;
            } else {
                let cumulativePercent = 0;
                pieSlices = options.map((opt, i) => {
                    const percent = (Number(opt.voteCount) || 0) / totalVotes;
                    if (percent === 0) return '';
                    if (percent === 1) return `<circle r="1" cx="0" cy="0" fill="${['#22c55e','#3b82f6','#f97316','#ec4899'][i % 4]}" />`;
                    const startX = Math.cos(2 * Math.PI * cumulativePercent);
                    const startY = Math.sin(2 * Math.PI * cumulativePercent);
                    cumulativePercent += percent;
                    const endX = Math.cos(2 * Math.PI * cumulativePercent);
                    const endY = Math.sin(2 * Math.PI * cumulativePercent);
                    const largeArc = percent > 0.5 ? 1 : 0;
                    return `<path d="M 0 0 L ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} Z" fill="${['#22c55e','#3b82f6','#f97316','#ec4899'][i % 4]}"></path>`;
                }).join('');
            }

            rootElement.innerHTML = `
                <div class="flex justify-between items-center mb-12">
                    <div class="flex items-center gap-4">
                        <span class="bg-red-500/20 text-red-500 border border-red-500/30 px-4 py-1.5 rounded-full text-xs font-black tracking-widest flex items-center gap-2 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div> LIVE REPORT
                        </span>
                        <div class="h-[1px] w-12 bg-white/20"></div>
                        <span class="text-sm font-bold text-white/50 tracking-wider">已投 ${totalVotes} 票</span>
                    </div>
                    
                    <div class="flex gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10 backdrop-blur-md">
                        <button onclick="window.setChart('bar')" class="${state.currentChart==='bar'?'bg-blue-600 text-white':'text-white/40 hover:text-white'} px-5 py-2 rounded-xl text-sm font-bold transition-colors">長條圖</button>
                        <button onclick="window.setChart('pie')" class="${state.currentChart==='pie'?'bg-blue-600 text-white':'text-white/40 hover:text-white'} px-5 py-2 rounded-xl text-sm font-bold transition-colors">圓餅圖</button>
                        <button onclick="window.setChart('none')" class="${state.currentChart==='none'?'bg-blue-600 text-white':'text-white/40 hover:text-white'} px-5 py-2 rounded-xl text-sm font-bold transition-colors">隱藏圖表</button>
                    </div>
                </div>

                <h1 class="${state.currentChart === 'none' ? 'text-center max-w-5xl mx-auto' : 'text-left'} text-4xl lg:text-5xl font-black mb-16 leading-snug tracking-wide">
                    ${target.question}
                </h1>

                <div class="flex flex-col lg:flex-row gap-12 items-start ${state.currentChart === 'none' ? 'justify-center' : ''}">
                    
                    ${state.currentChart !== 'none' ? `
                    <div class="w-full lg:w-5/12 glass-card p-10 h-[450px] flex items-center justify-center">
                        ${state.currentChart === 'bar' ? `
                            <div class="flex items-end justify-around w-full h-full pt-10">
                                ${options.map((opt, i) => {
                                    const h = totalVotes > 0 ? ((Number(opt.voteCount)||0) / totalVotes * 90) : 5;
                                    return `
                                        <div class="flex flex-col items-center gap-4 w-full h-full justify-end">
                                            <span class="text-2xl font-black">${opt.voteCount || 0}</span>
                                            <div class="w-16 rounded-t-xl opt-bg-${i%4} animate-bar shadow-lg" style="height: ${h}%"></div>
                                            <span class="opacity-40 text-sm font-bold">${String.fromCharCode(65+i)}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : `
                            <div class="relative w-full h-full flex items-center justify-center">
                                <svg viewBox="-1.1 -1.1 2.2 2.2" class="h-[90%] w-[90%] animate-pie drop-shadow-2xl">
                                    ${pieSlices}
                                    <circle r="0.65" fill="#201c3f" />
                                </svg>
                                <div class="absolute flex flex-col items-center">
                                    <span class="text-sm opacity-40 mb-1">總票數</span>
                                    <span class="text-5xl font-black">${totalVotes}</span>
                                </div>
                            </div>
                        `}
                    </div>
                    ` : ''}

                    <div class="w-full ${state.currentChart !== 'none' ? 'lg:w-7/12' : 'max-w-4xl mx-auto'} flex flex-col gap-6">
                        ${options.map((opt, i) => {
                            const vote = Number(opt.voteCount) || 0;
                            const per = totalVotes > 0 ? Math.round(vote/totalVotes*100) : 0;
                            return `
                                <div class="flex justify-between items-center px-8 py-5 rounded-[2rem] border-2 opt-${i%4} bg-white/5 backdrop-blur-md relative overflow-hidden group hover:bg-white/10 transition-colors">
                                    <div class="absolute left-0 top-0 bottom-0 opt-bg-${i%4} opacity-10 transition-all duration-1000" style="width: ${per}%"></div>
                                    
                                    <div class="flex items-center gap-6 relative z-10">
                                        <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg opt-bg-${i%4} text-white shadow-lg">
                                            ${String.fromCharCode(65+i)}
                                        </div>
                                        <span class="text-2xl font-bold text-white/90">${opt.text || opt.label}</span>
                                    </div>
                                    <div class="text-right relative z-10">
                                        <div class="text-3xl font-black text-white">${vote} <span class="text-sm font-medium text-white/40">票</span></div>
                                        <div class="text-xs font-bold text-white/30 tracking-widest mt-1">${per}%</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}

                        <div class="pt-6">
                            <button onclick="window.revealAnswer()" class="w-full bg-gradient-to-r from-orange-500 to-amber-600 shadow-[0_10px_30px_rgba(245,158,11,0.2)] hover:shadow-[0_10px_40px_rgba(245,158,11,0.4)] py-6 rounded-2xl text-2xl font-black text-white active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                                <span class="text-3xl">💡</span> ${state.answerVisible ? '隱藏解答' : '公佈答案'}
                            </button>
                        </div>

                        ${state.answerVisible ? `
                        <div class="animate-slide-down">
                            <div class="bg-[#241a0b] border-2 border-amber-500/50 rounded-3xl p-10 relative overflow-hidden backdrop-blur-xl">
                                <div class="absolute -top-10 -right-10 w-40 h-40 bg-amber-500/20 rounded-full blur-[60px]"></div>
                                <div class="flex items-center gap-4 mb-6 relative z-10">
                                    <div class="w-12 h-12 bg-amber-500 text-black rounded-full flex items-center justify-center text-2xl shadow-lg shadow-amber-500/40">💡</div>
                                    <h2 class="text-3xl font-black text-amber-500 tracking-wider">專家解答</h2>
                                </div>
                                <div class="text-xl leading-relaxed text-amber-50/90 font-medium relative z-10">
                                    ${expertMsg}
                                </div>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        window.setChart = (type) => { window.uiState.currentChart = type; renderView(); };
        window.revealAnswer = () => { window.uiState.answerVisible = !window.uiState.answerVisible; renderView(); };

        onValue(ref(db, 'polls'), (snapshot) => {
            lastRawData = snapshot.val();
            renderView();
        });
    </script>
</body>
</html>
